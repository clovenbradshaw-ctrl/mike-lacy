<!DOCTYPE html>
<!-- build: 2026-04-14 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Index of /</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<!-- Archivo — a grotesque sans used only in the blog post viewer: slightly
     angular, no-nonsense, carries editorial authority without the slab-serif
     weight. Preconnect so the font handshake happens in parallel with the
     first paint; font-display: swap in the @font-face declaration below means
     system-ui renders first and Archivo folds in without a FOUT block. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }
html { height: 100%; }
body {
  /* One geometric system-sans stack for the whole site — in the spirit of
     Phosphor icons (even weight, crisp stroke, restrained). Every
     descendant inherits this unless it explicitly overrides. */
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  color: #111;
  background: #fff;
  padding: 14px 14px 32px;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
h1 { font-size: 16px; font-weight: 600; margin-bottom: 2px; letter-spacing: -0.01em; }
hr { border: none; border-top: 1px solid #bbb; margin: 6px 0 10px; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
/* Fixed columns so long titles can't collapse the Description column into a
   slender ribbon. File-explorer style: Name takes the lion's share, Created
   is a tight tabular column, Description gets room to breathe. */
col.c-icon { width: 28px; }
col.c-name { width: 30%; }
col.c-date { width: 108px; }
col.c-desc { width: auto; }
/* Tablet: pull the name column in a touch so Description stays the widest. */
@media (max-width: 1023px) {
  col.c-name { width: 34%; }
  col.c-date { width: 96px; }
}
/* Mobile: a fixed-column Apache index in 390px starves both Name and
   Description. Drop the Description column; the JS moves it to a second
   row underneath so blurbs stay full-width and legible. */
@media (max-width: 639px) {
  col.c-icon { width: 22px; }
  col.c-name { width: auto; }
  col.c-date { width: 88px; }
  td.w-desc, th.desc { display: none; }
  tr.w-desc-row td {
    display: block;
    padding: 2px 0 10px 0;
    color: #555;
    font-size: 13px;
    line-height: 1.5;
    border-top: none;
  }
}
/* Outside mobile, the fallback desc-row is hidden (we use the column). */
@media (min-width: 640px) {
  tr.w-desc-row { display: none; }
}
th {
  text-align: left; padding: 2px 10px 3px 0;
  font-weight: 600; white-space: nowrap;
  font-size: 13px;
}
td { padding: 2px 6px 2px 0; vertical-align: top; word-break: break-word; }
td a { word-break: break-word; overflow-wrap: anywhere; }
/* Size column is a vestige of the original Apache-style header; hide it
   everywhere it appears. */
th.size, td.size { display: none; }
a { cursor: pointer; }
address {
  font-style: italic; font-size: 12px; color: #555;
  margin-top: 14px; padding-top: 6px;
}

/* ── /writing/ structured rows ──────────────────────────────────────────────
   Still an Apache-style index — just with breathing room so the title reads
   as the primary line and the description sits beneath it as metadata. */
.w-section td {
  padding: 22px 0 4px;
  border-top: 1px solid #111;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  color: #111;
}
.w-section.first td { border-top: none; padding-top: 10px; }
tr.w-row td {
  padding: 10px 0 2px;
  border-top: 1px dotted #ccc;
  vertical-align: top;
}
tr.w-row.first-in-section td { border-top: none; }
td.w-main { padding-right: 16px; }
td.w-main a {
  font-weight: 600;
  font-size: 14px;
  line-height: 1.35;
  color: #111;
  text-decoration: underline;
}
td.w-date {
  white-space: nowrap;
  color: #555;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  padding-right: 8px;
}
td.w-desc {
  color: #555;
  font-size: 12px;
  line-height: 1.5;
  padding: 10px 0 2px 14px;
  border-top: 1px dotted #ccc;
  vertical-align: top;
  word-break: normal;
  overflow-wrap: anywhere;
}
tr.w-row.first-in-section td.w-desc { border-top: none; }
/* Faint row-hover background: grayscale, matches page bg family — no accent,
   no link color shift. Purely tactile cue that rows are clickable targets. */
tr.w-row:hover td { background: #f4f2ec; }
/* Footer count line for /writing/. Same muted tone as the Apache address. */
tr.w-count td {
  padding: 14px 0 2px;
  font-size: 12px;
  color: #555;
  border-top: 1px solid #111;
}
@media (min-width: 768px) {
  td.w-main a { font-size: 15px; }
  td.w-desc { font-size: 13px; }
}

#breadcrumb {
  font-size: 12px;
  margin-bottom: 10px;
  line-height: 1.5;
}
#breadcrumb .sep { color: #777; margin: 0 3px; }
#breadcrumb .cur { color: #555; }

#viewer, #textviewer, #embedviewer { display: none; }
.v-chrome {
  display: flex; justify-content: space-between;
  align-items: baseline; flex-wrap: wrap;
  gap: 8px; margin-bottom: 4px;
}
.v-filename { font-weight: 600; font-size: 13px; word-break: break-word; overflow-wrap: anywhere; }
.v-meta { color: #555; font-size: 12px; }

/* Post viewer — accountability-journalism grotesque: a tight 600-weight
   sans title (Archivo where available, system-ui elsewhere) over a quiet,
   tertiary metadata line. The slab-serif look read "literary magazine";
   a sharper grotesque reads "beat reporter". The index chrome is already
   sans, so the post viewer now shares one type system with it — the shift
   in register comes from size, weight, and spacing, not a font swap. */
#viewer .v-chrome {
  display: block;
  margin-bottom: 14px;
}
#viewer .v-filename {
  display: block;
  font-family: Archivo, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-weight: 600;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.022em;
  color: #111;
  margin: 18px 0 10px;
}
#viewer .v-meta {
  display: block;
  color: #8a8a8a;
  font-size: 12.5px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.01em;
}
@media (min-width: 768px) {
  #viewer .v-filename { font-size: 40px; line-height: 1.12; letter-spacing: -0.024em; margin: 22px 0 12px; }
  #viewer .v-meta { font-size: 13px; }
}

#content-window, #text-window {
  overflow-y: auto;
  overflow-x: hidden;
  height: calc(100vh - 130px);
  min-height: 380px;
  padding: 16px 0 0;
  margin-top: 8px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
#text-window pre {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 13px;
  line-height: 1.6;
  color: #111;
  margin: 0;
}
#tv-body {
  font-size: 15px;
  line-height: 1.6;
  color: #111;
  word-break: break-word;
  overflow-wrap: break-word;
}
#tv-body h1, #tv-body h2, #tv-body h3, #tv-body h4 {
  font-weight: 600; letter-spacing: -0.01em;
  margin: 1.6em 0 .4em; line-height: 1.25; color: #111;
}
#tv-body h1 { font-size: 20px; }
#tv-body h2 { font-size: 17px; }
#tv-body h3 { font-size: 15px; }
#tv-body p  { margin: 0 0 1em; }
#tv-body ul, #tv-body ol { margin: 0 0 1em 1.3em; }
#tv-body li { margin-bottom: 0.35em; }
#tv-body hr { border: none; border-top: 1px solid #ccc; margin: 1.4em 0; }
#tv-body a  { word-break: break-word; overflow-wrap: anywhere; }
#tv-body code {
  background: #f4f4f4; padding: 0 3px;
  font-size: 12.5px;
}
#tv-body strong { font-weight: 600; }
#tv-body em { font-style: italic; }

/* Reading body — grotesque sans tuned for accountability reporting: short
   lines skim fast, links don't fragment paragraphs (they inherit text color
   with a 1px underline offset 3px off the baseline), and the whole column
   uses one font so the eye isn't constantly switching registers between
   body, headings, and inline UI widgets (subscribe, file-embed, pullquote). */
#content-window {
  color: #1a1a1a;
  font-family: Archivo, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
#content-window p {
  font-size: 16px; line-height: 1.7; margin: 0 0 1.15em; color: #1a1a1a;
  word-wrap: break-word; overflow-wrap: break-word;
}
#content-window a {
  color: inherit;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: rgba(17,17,17,0.4);
  word-break: break-word; overflow-wrap: anywhere;
}
#content-window a:hover { text-decoration-color: #111; }
#content-window blockquote {
  border-left: 3px solid #222; margin: 1.5em 0; padding: 0.1em 0 0.1em 18px;
  color: #333;
}
#content-window blockquote p { font-style: italic; font-size: 16px; line-height: 1.6; }
#content-window h1, #content-window h2, #content-window h3, #content-window h4 {
  font-family: inherit;
  font-weight: 600; letter-spacing: -0.018em;
  margin: 1.8em 0 .5em; line-height: 1.2; color: #111;
}
#content-window h1 { font-size: 24px; }
#content-window h2 { font-size: 20px; }
#content-window h3 { font-size: 17px; }
#content-window hr { border: none; border-top: 1px solid #d6d6d6; margin: 2em auto; width: 40%; }

/* Images: default to ~2/3 of the column, centered, with a zoom cursor so
   readers know the shadowbox is available. On narrow viewports we let them
   breathe full-width — 2/3 of a phone is too small to see. */
#content-window figure { margin: 1.8em auto; max-width: 100%; text-align: center; }
#content-window img {
  display: block;
  width: 66.6667%;
  max-width: 100%;
  height: auto;
  margin: 0 auto;
  cursor: zoom-in;
  border-radius: 2px;
}
@media (max-width: 639px) {
  #content-window img { width: 100%; }
}
#content-window figcaption,
#content-window .image-caption {
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  color: #6b6b6b;
  line-height: 1.5;
  margin-top: 8px;
  text-align: center;
  font-style: normal;
}
#content-window ul, #content-window ol {
  font-size: 16px; line-height: 1.7; margin: 0 0 1.15em 1.4em;
}
#content-window li { margin-bottom: 0.45em; word-wrap: break-word; overflow-wrap: break-word; }
#content-window pre {
  font-size: 12.5px;
  background: #f4f4f4; border: 1px solid #ddd;
  padding: 10px 12px; overflow-x: auto; margin: 1em 0;
  white-space: pre-wrap;
  word-break: break-word;
}
#content-window code {
  font-size: 12.5px;
  background: #f4f4f4; padding: 0 3px;
  word-break: break-word;
}
#content-window pre code { background: none; padding: 0; }
#content-window video, #content-window iframe {
  max-width: 100%; height: auto; display: block;
}
/* Substack wraps images in an <a class="image-link"> that points to the
   full-size asset. We intercept that click for the shadowbox, but keep the
   anchor styled as a plain image (no underline, inherit block layout). */
#content-window a.image-link,
#content-window a.image-link:hover {
  display: block;
  text-decoration: none;
  border: 0;
}
#content-window .captioned-image-container figure { text-align: center; }
#content-window .captioned-image-container img { margin: 0 auto; }

#e-frame { width: 100%; height: calc(100vh - 130px); min-height: 420px; border: 1px solid #999; background: #fff; margin-top: 8px; }

.loading { color: #555; font-style: italic; padding: 16px 0; }
.error { color: #a00; padding: 16px 0; }

/* ── Substack-post embedded widgets ─────────────────────────────────────── */

/* Subscribe form — a 3px left rule instead of a full border box. Gives the
   CTA visual separation from body prose without a card/background that would
   scream "advertisement." Action content sits on the left; the secondary
   "follow on social" line inside .preamble drops a step in size + color so
   the primary ask reads first. */
#content-window .subscription-widget-wrap-editor,
#content-window .subscription-widget-wrap { margin: 1.5em 0; }
#content-window .subscription-widget {
  border: none;
  border-left: 3px solid #111;
  padding: 6px 0 6px 18px;
  text-align: left;
}
#content-window .subscription-widget .preamble {
  margin-bottom: 10px;
  font-size: 13px;
  color: #6b6b6b;
  line-height: 1.5;
}
#content-window .subscription-widget .cta-caption {
  font-size: 15px;
  line-height: 1.5;
  margin: 0 0 10px;
  font-style: normal;
  font-weight: 500;
  color: #111;
}
#content-window .subscription-widget-subscribe {
  display: flex;
  gap: 6px;
  align-items: stretch;
  flex-wrap: wrap;
  justify-content: flex-start;
}
#content-window .subscription-widget-subscribe .email-input {
  flex: 1 1 220px;
  min-width: 0;
  font: inherit;
  font-size: 13px;
  padding: 6px 8px;
  border: 1px solid #999;
  background: #fff;
  color: #111;
}
#content-window .subscription-widget-subscribe .email-input::placeholder { color: #888; }
#content-window .subscription-widget-subscribe .button.primary,
#content-window .button.primary {
  display: inline-block;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  background: #111;
  color: #fff;
  border: 1px solid #111;
  text-decoration: none;
  cursor: pointer;
  letter-spacing: 0.005em;
}
#content-window .subscription-widget-subscribe .button.primary:hover,
#content-window .button.primary:hover {
  background: #333;
  border-color: #333;
}
#content-window .fake-input-wrapper { display: none; }

/* Button-wrapper (e.g. "Python Script" download) */
#content-window .button-wrapper { margin: 1.4em 0; }
#content-window .button-wrapper a.button.primary span { color: inherit; }
#content-window .button-wrapper a.button.primary { text-decoration: none; }

/* Pullquotes */
#content-window .pullquote {
  border-left: 2px solid #bbb;
  margin: 1.4em 0;
  padding: 0 14px;
}
#content-window .pullquote p {
  font-size: 15px;
  line-height: 1.55;
  margin-bottom: 0.5em;
  font-style: italic;
}
#content-window .pullquote p:last-child { margin-bottom: 0; }
#content-window .pullquote strong { font-style: normal; }

/* Inline "digest" / recommended post embed */
#content-window .digest-post-embed {
  display: none; /* metadata-only node; has no rendered content without Substack JS */
}

/* Image captions improved */
#content-window .image-caption {
  font-size: 11px;
  color: #555;
  margin-top: 4px;
  text-align: center;
}
#content-window .captioned-image-container figure { text-align: center; }
#content-window .captioned-image-container img { margin: 0 auto; }

/* Hide non-functional image overlay action buttons (Substack restack/expand) */
#content-window .image-link-expand,
#content-window .pencraft.icon-container { display: none !important; }

/* YouTube embeds */
#content-window .youtube-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
  margin: 1.4em 0;
  background: #000;
  overflow: hidden;
}
#content-window .youtube-wrap .youtube-inner,
#content-window .youtube-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
  border: 0;
}

/* Native video placeholder (shows nothing meaningful without JS) */
#content-window .native-video-embed:empty { display: none; }

/* File-embed widget (PDF / attachment download cards) */
#content-window .file-embed-wrapper { margin: 1.4em 0; }
#content-window .file-embed-container-reader {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid #999;
  background: #fafafa;
  padding: 12px 14px;
  border-radius: 4px;
}
#content-window .file-embed-container-top {
  display: contents; /* let children participate in the flex row directly */
}
#content-window .file-embed-thumbnail-default {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  display: block;
}
#content-window .file-embed-details {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#content-window .file-embed-details-h1 {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  color: #111;
  word-break: break-word;
  overflow-wrap: anywhere;
}
#content-window .file-embed-details-h2 {
  font-size: 11.5px;
  color: #8a8a8a;
  letter-spacing: 0.01em;
}
/* Download button: lighter outline rather than filled-black. At this size a
   solid button dominates the card visually relative to what it is — a
   secondary "here's the underlying file" offer. Outline keeps it tappable
   and obvious without stealing the reader's eye from the article body. */
#content-window .file-embed-button {
  flex: 0 0 auto;
  display: inline-block;
  font-size: 12.5px;
  font-weight: 600;
  padding: 5px 12px;
  background: #fff;
  color: #111;
  border: 1px solid #111;
  text-decoration: none;
  cursor: pointer;
  white-space: nowrap;
}
#content-window .file-embed-button:hover {
  background: #111;
  color: #fff;
}
#content-window .file-embed-button-text { color: inherit; }
/* Substack ships both wide+narrow buttons; show only one to avoid duplicates. */
#content-window .file-embed-button.narrow { display: none; }
@media (max-width: 520px) {
  #content-window .file-embed-container-reader {
    flex-wrap: wrap;
  }
  #content-window .file-embed-button.wide { display: none; }
  #content-window .file-embed-button.narrow {
    display: inline-block;
    width: 100%;
    text-align: center;
    margin-top: 4px;
  }
}

@media (max-width: 520px) {
  #content-window .subscription-widget-subscribe .email-input { flex-basis: 100%; }
  #content-window .subscription-widget-subscribe .button.primary { flex: 1 1 100%; }
}

/* Desktop: a comfortable reading column. Sans-serif chrome (index, tables,
   metadata) goes a touch bigger; the serif article body bumps up to the
   ~19px Substack sits at, capped near 68ch so lines don't sprawl. */
@media (min-width: 768px) {
  body { max-width: 960px; padding: 20px 24px 40px; font-size: 14px; }
  h1 { font-size: 18px; }
  #breadcrumb { font-size: 13px; }
  th, td { font-size: 14px; }
  #content-window p,
  #content-window ul,
  #content-window ol { font-size: 17px; line-height: 1.7; }
  #content-window h1 { font-size: 28px; }
  #content-window h2 { font-size: 22px; }
  #content-window h3 { font-size: 18px; }
  #content-window blockquote p { font-size: 17px; }
  #text-window pre { font-size: 14px; max-width: 80ch; }

  /* Cap reading-text blocks near ~68ch — Substack-ish — so lines stay
     scannable on wide screens. Figures are intentionally NOT capped so
     they keep their 2/3 proportion relative to the full column. */
  #content-window p,
  #content-window ul,
  #content-window ol,
  #content-window blockquote,
  #content-window h1,
  #content-window h2,
  #content-window h3,
  #content-window h4,
  #content-window pre,
  #content-window .pullquote,
  #content-window .subscription-widget-wrap,
  #content-window .subscription-widget-wrap-editor,
  #content-window .file-embed-wrapper,
  #content-window .button-wrapper {
    max-width: 68ch;
    margin-left: auto;
    margin-right: auto;
  }
}

/* ── Shadowbox / lightbox ─────────────────────────────────────────────────
   Click any article image → full-size overlay. No dependencies, no
   third-party JS; just a fixed overlay with the image centered and a
   close-on-click / close-on-escape contract. */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: zoom-out;
  padding: 24px;
  animation: lb-fade 140ms ease-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  border-radius: 2px;
  cursor: zoom-out;
}
#lightbox .lb-close {
  position: absolute;
  top: 14px;
  right: 18px;
  font: 600 22px/1 ui-sans-serif, system-ui, sans-serif;
  color: #eee;
  background: transparent;
  border: 0;
  padding: 6px 10px;
  cursor: pointer;
  opacity: 0.75;
}
#lightbox .lb-close:hover { opacity: 1; }
@keyframes lb-fade { from { opacity: 0 } to { opacity: 1 } }
</style>
</head>
<body>

<div id="breadcrumb"></div>

<div id="listing">
  <h1 id="dir-title">Index of /</h1>
  <hr>
  <table>
    <colgroup>
      <col class="c-icon">
      <col class="c-name">
      <col class="c-date">
      <col class="c-desc">
    </colgroup>
    <thead><tr>
      <th colspan="2">Name</th>
      <th class="date">Created</th>
      <th class="desc">Description</th>
    </tr></thead>
    <tbody id="dir-body"></tbody>
  </table>
  <hr>
  <address class="server-sig"></address>
</div>

<div id="viewer">
  <div class="v-chrome">
    <span class="v-filename" id="v-filename"></span>
    <span class="v-meta" id="v-meta"></span>
  </div>
  <hr>
  <div id="content-window"></div>
  <address class="server-sig"></address>
</div>

<div id="textviewer">
  <h1 id="tv-title"></h1>

// ── state ────────────────────────────────────────────────────────────────────

// history management — so the browser back/forward buttons navigate the reader
// Hash-encode the state into the URL so reload + direct linking work.
function hashOf(s) {
  if (!s) return '';
  if (s.view === 'dir')   return '#' + (s.path || '/');
  if (s.view === 'post')  return '#' + (s.fromP || '/writing/') + s.file;
  if (s.view === 'text')  return '#' + (s.fromP || '/') + s.name;
  if (s.view === 'embed') return '#' + (s.fromP || '/projects/') + s.name;
  return '';
}
let suppressHashChange = false;
function pushNav(state, replace) {
  const h = hashOf(state);
  try {
    suppressHashChange = true;
    if (replace) history.replaceState(state, '', h || location.pathname + location.search);
    else history.pushState(state, '', h || location.pathname + location.search);
  } catch (_) { /* ignore — file:// can reject */ }
  // Release suppression on next tick (hashchange fires async after URL mutation).
  setTimeout(() => { suppressHashChange = false; }, 0);
}
// Decode a URL hash like "#/writing/FILE.html" back into a view state.
function stateFromHash(h) {
  if (!h || h === '#' || h === '#/') return { view:'dir', path:'/' };
  let path = h.startsWith('#') ? h.slice(1) : h;
  try { path = decodeURIComponent(path); } catch (_) { /* keep raw */ }
  if (!path.startsWith('/')) path = '/' + path;

  // Directory: trailing slash.
  if (path.endsWith('/')) {
    if (dirs[path] || path === '/writing/') return { view:'dir', path };
    return { view:'dir', path:'/' };
  }

  // Split into parent directory + leaf.
  const slash = path.lastIndexOf('/');
  const fromP = path.slice(0, slash + 1);
  const leaf  = path.slice(slash + 1);

  // Post under /writing/ — leaf is the post filename.
  if (fromP === '/writing/' && POST_BY_FILE[leaf]) {
    return { view:'post', file:leaf, fromP };
  }
  // Entry under any known dir — could be post, embed, or directory.
  const entries = dirs[fromP] || [];
  const entry = entries.find(e => e.name === leaf || (e.file && e.file === leaf));
  if (entry) {
    if (entry.type === 'post')  return { view:'post',  file:entry.file, fromP };
    if (entry.type === 'embed') return { view:'embed', name:entry.name, src:entry.src, date:entry.date, desc:entry.desc, fromP };
    if (entry.type === 'file')  return { view:'text',  name:entry.name, fromP };
    if (entry.type === 'dir')   return { view:'dir',   path:fromP + entry.name + '/' };
  }
  // Text file at root by bare name.
  if (fromP === '/' && files.hasOwnProperty(leaf)) {
    return { view:'text', name:leaf, fromP:'/' };
  }
  return { view:'dir', path:'/' };
}
function restoreFromState(s) {
  if (!s) { render('/', true); return; }
  if (s.view === 'dir')   { render(s.path || '/', true); return; }
  if (s.view === 'post')  {
    const meta = POST_BY_FILE[s.file] || { f:s.file, t:s.file, d:'', desc:'' };
    openPost(meta, s.fromP || '/writing/', true); return;
  }
  if (s.view === 'text')  { openText(s.name, s.fromP || '/', true); return; }
  if (s.view === 'embed') {
    openEmbed({ name:s.name, src:s.src, date:s.date, desc:s.desc }, s.fromP || '/', true);
    return;
  }
  render('/', true);
}
window.addEventListener('popstate', e => {
  // If popstate carries our saved state, use it; otherwise derive from hash.
  if (e.state && e.state.view) restoreFromState(e.state);
  else restoreFromState(stateFromHash(location.hash));
});
window.addEventListener('hashchange', () => {
  if (suppressHashChange) return;
  restoreFromState(stateFromHash(location.hash));
});

function parentOf(path) {
  if (path === "/") return null;
  const parts = path.replace(/\/$/, "").split("/");
  parts.pop();
  return parts.length <= 1 ? "/" : parts.join("/") + "/";
}

function show(id) {
  // Explicit "block" — the stylesheet has `display:none` on #viewer/#textviewer/#embedviewer,
  // so we cannot just clear the inline style or the pane stays hidden.
  ["listing","viewer","textviewer","embedviewer"].forEach(x => {
    document.getElementById(x).style.display = x === id ? "block" : "none";
  });
}

// ── nav wrappers: push a history entry, then show the view ───────────────────
function goDir(path)             { pushNav({view:'dir',   path}); render(path); }
function goPost(meta, fromP)     { pushNav({view:'post',  file:meta.f, fromP}); openPost(meta, fromP); }
function goText(name, fromP)     { pushNav({view:'text',  name, fromP}); openText(name, fromP); }
function goEmbed(item, fromP)    {
  pushNav({view:'embed', name:item.name, src:item.src, date:item.date, desc:item.desc, fromP});
  openEmbed(item, fromP);
}

function renderBreadcrumb(path, filename) {
  const bc = document.getElementById("breadcrumb");
  const parts = path === "/" ? [] : path.replace(/^\//, "").replace(/\/$/, "").split("/");
  let html = '<a href="#" data-path="/">mikelacy.site</a>';
  let built = "/";
  parts.forEach(part => {
    built = built === "/" ? "/" + part + "/" : built + part + "/";
    html += '<span class="sep">/</span><a href="#" data-path="' + built + '">' + part + '</a>';
  });
  if (filename) html += '<span class="sep">/</span><span class="cur">' + filename + '</span>';
  bc.innerHTML = html;
  bc.querySelectorAll('a[data-path]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); goDir(a.dataset.path); });
  });
}

// ── /writing/ custom view ────────────────────────────────────────────────────

// Parent-directory row, styled consistently with the w-row layout so every
// directory listing shares the same visual rhythm as /writing/.
function parentDirRow(onClick) {
  const tr = document.createElement("tr");
  tr.className = "w-row w-parent first-in-section";
  tr.innerHTML =
    `<td></td>` +
    `<td class="w-main"><a href="#">Parent Directory</a></td>` +
    `<td class="w-date">—</td>` +
    `<td class="w-desc">—</td>`;
  tr.querySelector("a").addEventListener("click", e => { e.preventDefault(); onClick(); });
  return tr;
}

function renderWriting() {
  show("listing");
  document.title = "Index of /writing/";
  document.getElementById("dir-title").textContent = "Index of /writing/";
  const tbody = document.getElementById("dir-body");
  tbody.innerHTML = "";

  tbody.appendChild(parentDirRow(() => goDir("/")));

  const tierNames = {
    1: "TIER 1 — POSTS THAT CHANGED NASHVILLE POLICY",
    2: "TIER 2 — MAJOR INVESTIGATIONS & EXTERNAL PUBLICATION",
    3: "TIER 3 — DEEP INVESTIGATIONS & SERIES ANCHORS",
    4: "TIER 4 — PHILOSOPHY, VOICE, IDENTITY",
  };

  const escape = s => s.replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));

  // Pre-group posts by tier so we can both (a) render counts in the section
  // headers and (b) build the jump-to row without iterating twice.
  const postsByTier = { 1:[], 2:[], 3:[], 4:[] };
  POSTS.forEach(p => { if (postsByTier[p.tier]) postsByTier[p.tier].push(p); });
  [1,2,3,4].forEach(t => postsByTier[t].sort((a,b) => b.d.localeCompare(a.d)));

  [1,2,3,4].forEach((tier, tierIdx) => {
    const posts = postsByTier[tier];
    const sec = document.createElement("tr");
    sec.className = "w-section" + (tierIdx === 0 ? " first" : "");
    sec.id = "t" + tier;
    sec.innerHTML = `<td colspan="4">${tierNames[tier]}</td>`;
    tbody.appendChild(sec);

    posts.forEach((p, i) => {
      // Row anchor id derived from post filename's slug portion. Invisible
      // unless someone deep-links with "#p-<slug>"; no router impact because
      // the hash router only matches "/writing/<file>" shapes.
      const slug = p.f.replace(/^\d+\./, "").replace(/\.html$/, "").replace(/\.md$/, "");
      const tr = document.createElement("tr");
      tr.className = "w-row" + (i === 0 ? " first-in-section" : "");
      tr.id = "p-" + slug;
      tr.innerHTML =
        `<td></td>` +
        `<td class="w-main"><a href="#">${escape(p.t)}</a></td>` +
        `<td class="w-date">${p.d}</td>` +
        `<td class="w-desc">${p.desc ? escape(p.desc) : ''}</td>`;
      const open = () => goPost(p, "/writing/");
      tr.querySelector("a").addEventListener("click", e => { e.preventDefault(); open(); });
      tr.querySelector("td.w-desc").style.cursor = "pointer";
      tr.querySelector("td.w-desc").addEventListener("click", open);
      tbody.appendChild(tr);
      // Mobile fallback: when the Description column is hidden via media query,
      // this second row drops the blurb full-width beneath the title so it
      // stays legible on narrow viewports. Hidden on desktop by CSS.
      if (p.desc) {
        const dtr = document.createElement("tr");
        dtr.className = "w-desc-row";
        dtr.innerHTML = `<td colspan="4">${escape(p.desc)}</td>`;
        dtr.style.cursor = "pointer";
        dtr.addEventListener("click", open);
        tbody.appendChild(dtr);
      }
    });
  });

  // Footer count line. Reads like something an index generator would print.
  const lastUpdated = POSTS.reduce((a, p) => p.d > a ? p.d : a, "");
  const count = document.createElement("tr");
  count.className = "w-count";
  count.innerHTML =
    `<td colspan="4">/writing/ — ${POSTS.length} entries, last updated ${lastUpdated}</td>`;
  tbody.appendChild(count);
}

// ── generic directory render ─────────────────────────────────────────────────

function render(path) {
  if (path === "/writing/") { renderWriting(); renderBreadcrumb(path, null); return; }

  const entries = dirs[path];
  if (!entries) { render("/"); return; }

  renderBreadcrumb(path, null);
  show("listing");
  document.title = "Index of " + path;
  document.getElementById("dir-title").textContent = "Index of " + path;

  const tbody = document.getElementById("dir-body");
  tbody.innerHTML = "";

  const escape = s => String(s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));

  const parent = parentOf(path);
  const hasParent = parent !== null;
  if (hasParent) {
    tbody.appendChild(parentDirRow(() => goDir(parent)));
  }

  entries.forEach((item, i) => {
    const iconChar = item.type === "dir"   ? "📁"
                   : item.type === "embed" ? "🧰"
                   : item.type === "link"  ? "🔗"
                   :                          "📄";
    const displayName = item.type === "dir" ? item.name + "/" : item.name;
    const external = item.type === "link";

    const tr = document.createElement("tr");
    tr.className = "w-row" + (!hasParent && i === 0 ? " first-in-section" : "");
    tr.innerHTML =
      `<td class="w-icon"><span class="w-thumb-fallback">${iconChar}</span></td>` +
      `<td class="w-main"><a href="#">${escape(displayName)}</a></td>` +
      `<td class="w-date">${escape(item.date || "")}</td>` +
      `<td class="w-desc">${item.desc ? escape(item.desc) : ''}</td>`;

    const a = tr.querySelector("a");
    const activate = () => {
      if (item.type === "dir") {
        const child = path === "/" ? "/" + item.name + "/" : path + item.name + "/";
        goDir(child);
      } else if (item.type === "post") {
        const meta = POST_BY_FILE[item.file] || { f: item.file, t: item.name, d: item.date, desc: item.desc };
        goPost(meta, path);
      } else if (item.type === "embed") {
        goEmbed(item, path);
      } else {
        goText(item.name, path);
      }
    };
    if (external) {
      a.href = item.href;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      // No preventDefault — let the browser open the external link in a new tab.
    } else {
      a.addEventListener("click", e => { e.preventDefault(); activate(); });
      tr.querySelector("td.w-desc").style.cursor = "pointer";
      tr.querySelector("td.w-desc").addEventListener("click", activate);
    }
    tbody.appendChild(tr);
    // Mobile fallback row (hidden on desktop via media query).
    if (item.desc) {
      const dtr = document.createElement("tr");
      dtr.className = "w-desc-row";
      dtr.innerHTML = `<td colspan="4">${escape(item.desc)}</td>`;
      if (external) {
        dtr.innerHTML =
          `<td colspan="4"><a href="${item.href}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">${escape(item.desc)}</a></td>`;
      } else {
        dtr.style.cursor = "pointer";
        dtr.addEventListener("click", activate);
      }
      tbody.appendChild(dtr);
    }
  });
}

// ── text viewer ──────────────────────────────────────────────────────────────

function openEmbed(item, fromP) {
  show("embedviewer");
  renderBreadcrumb(fromP, item.name);
  document.getElementById("e-filename").textContent = item.name;
  document.getElementById("e-meta").textContent = item.date + ' · ' + (item.desc || '');
  const frame = document.getElementById("e-frame");
  if (frame.src !== item.src) frame.src = item.src;
  document.title = item.name;
}

function openText(name, fromP) {
  show("textviewer");
  renderBreadcrumb(fromP, name);
  document.getElementById("tv-title").textContent = name;
  document.getElementById("text-window").scrollTop = 0;
  document.title = name;
  const body = document.getElementById("tv-body");
  if (name === "README") {
    body.innerHTML = '<p class="loading">Loading…</p>';
    fetch("./README.md")
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        body.innerHTML = renderMarkdown(txt);
        body.querySelectorAll('a').forEach(a => {
          if (a.href && /^https?:/i.test(a.getAttribute('href') || '')) {
            a.target = '_blank'; a.rel = 'noopener';
          }
        });
      })
      .catch(() => { body.textContent = "[README.md could not be loaded]"; });
  } else if (name === "robots.txt") {
    // Fetch the real robots.txt from the site root so the viewer can't drift
    // from what crawlers actually see.
    body.innerHTML = '<p class="loading">Loading…</p>';
    fetch("./robots.txt", { cache: "no-cache" })
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        const esc = txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        body.innerHTML = "<pre>" + esc + "</pre>";
      })
      .catch(() => { body.textContent = "[robots.txt could not be loaded]"; });
  } else {
    // Plain-text files (contact.txt) preserve whitespace.
    body.innerHTML = "<pre>" + (files[name] || "[no content]") + "</pre>";
  }
}

// ── minimal markdown renderer ────────────────────────────────────────────────
// Intentionally small and self-contained — just enough for README.md:
// headings, hr, lists, paragraphs, links, bold/italic, inline code.
function renderMarkdown(src) {
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inline = s => {
    // escape first, then apply inline patterns against the escaped string
    let t = esc(s);
    // inline code
    t = t.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    // images ![alt](url) — rendered as links to keep the renderer tiny
    t = t.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, alt, url) =>
      '<a href="' + url + '">' + (alt || url) + '</a>');
    // links [text](url)
    t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, txt, url) =>
      '<a href="' + url + '">' + txt + '</a>');
    // bold
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    // italic (allow after space, (, or inside an anchor tag boundary)
    t = t.replace(/(^|[\s(>])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    t = t.replace(/(^|[\s(>])_([^_\n]+)_/g, '$1<em>$2</em>');
    return t;
  };
  const lines = src.replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let i = 0, listType = null, listBuf = [], paraBuf = [];
  const flushPara = () => {
    if (paraBuf.length) {
      out.push('<p>' + inline(paraBuf.join(' ')) + '</p>');
      paraBuf = [];
    }
  };
  const flushList = () => {
    if (listBuf.length) {
      const tag = listType === 'ol' ? 'ol' : 'ul';
      out.push('<' + tag + '>' + listBuf.map(it => '<li>' + inline(it) + '</li>').join('') + '</' + tag + '>');
      listBuf = []; listType = null;
    }
  };
  while (i < lines.length) {
    const line = lines[i];
    // blank
    if (/^\s*$/.test(line)) { flushPara(); flushList(); i++; continue; }
    // horizontal rule
    if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) {
      flushPara(); flushList(); out.push('<hr>'); i++; continue;
    }
    // heading
    const h = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
    if (h) {
      flushPara(); flushList();
      const lvl = h[1].length;
      out.push('<h' + lvl + '>' + inline(h[2]) + '</h' + lvl + '>');
      i++; continue;
    }
    // unordered list item
    const ul = line.match(/^\s*[-*+]\s+(.*)$/);
    if (ul) {
      flushPara();
      if (listType && listType !== 'ul') flushList();
      listType = 'ul'; listBuf.push(ul[1]); i++; continue;
    }
    // ordered list item
    const ol = line.match(/^\s*\d+\.\s+(.*)$/);
    if (ol) {
      flushPara();
      if (listType && listType !== 'ol') flushList();
      listType = 'ol'; listBuf.push(ol[1]); i++; continue;
    }
    // paragraph accumulator
    flushList();
    paraBuf.push(line.trim());
    i++;
  }
  flushPara(); flushList();
  return out.join('\n');
}

// ── html post sanitize ───────────────────────────────────────────────────────

function sanitize(html) {
  const doc = new DOMParser().parseFromString('<div id="r">' + html + '</div>', 'text/html');
  const root = doc.getElementById('r');
  root.querySelectorAll('button,.image-link-expand,.pencraft,script,style').forEach(el => el.remove());
  root.querySelectorAll('.image2-inset').forEach(el => el.replaceWith(...el.childNodes));
  root.querySelectorAll('figure a.image-link').forEach(a => a.replaceWith(...a.childNodes));
  root.querySelectorAll('source').forEach(s => s.remove());
  root.querySelectorAll('img').forEach(img => {
    ['srcset','data-attrs','fetchpriority','width','height','sizes'].forEach(a => img.removeAttribute(a));
    img.loading = 'lazy';
  });
  root.querySelectorAll('a').forEach(a => {
    if (a.href && !a.href.startsWith('#')) { a.target = '_blank'; a.rel = 'noopener'; }
  });
  return root.innerHTML;
}

function wordCount(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return (d.textContent || '').split(/\s+/).filter(Boolean).length;
}

// Posts are stored as .md files with YAML-ish frontmatter followed by a raw
// HTML body (we "embrace the HTML" rather than converting to MD syntax). Split
// the frontmatter off so the body can go through the same sanitize pipeline.
function parseFrontmatter(raw) {
  const m = raw.match(/^---\s*\r?\n([\s\S]*?)\r?\n---\s*\r?\n([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split(/\r?\n/).forEach(line => {
    const mm = line.match(/^([A-Za-z_][\w-]*)\s*:\s*(.*)$/);
    if (!mm) return;
    let v = mm[2].trim();
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      v = v.slice(1, -1).replace(/\\"/g, '"').replace(/\\'/g, "'");
    }
    meta[mm[1]] = v;
  });
  return { meta, body: m[2] };
}

async function openPost(meta, fromP) {
  show("viewer");
  renderBreadcrumb(fromP, meta.f);
  document.getElementById('v-filename').textContent = meta.t;
  document.getElementById('v-meta').textContent = meta.d + ' · loading…';
  document.getElementById('content-window').innerHTML = '<div class="loading">fetching posts/' + meta.f + ' …</div>';
  document.title = meta.t;

  // Cache-bust with the build tag so a stale CDN 404 on first deploy of a
  // renamed post doesn't strand the reader on an "HTTP 404" page.
  const url = 'posts/' + meta.f + '?v=' + encodeURIComponent(BUILD_TAG);
  try {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + url);
    const raw = await res.text();
    const { meta: fm, body } = parseFrontmatter(raw);
    // Prefer title/date from the file's own frontmatter — the post file is
    // the source of truth; the manifest entry is just a fallback.
    if (fm.title) {
      document.getElementById('v-filename').textContent = fm.title;
      document.title = fm.title;
    }
    const clean = sanitize(body);
    const wc = wordCount(body);
    const mins = Math.max(1, Math.ceil(wc / 220));
    document.getElementById('v-meta').textContent =
      (fm.date || meta.d) + ' · ' + wc.toLocaleString() + ' words · ~' + mins + ' min read';
    const w = document.getElementById('content-window');
    w.innerHTML = clean;
    w.scrollTop = 0;
  } catch (err) {
    document.getElementById('content-window').innerHTML =
      '<div class="error">Could not load post.<br>' +
      'If you opened this file directly (file://), your browser may block fetch. ' +
      'Serve with <code>python3 -m http.server</code> and visit http://localhost:8000.<br><br>' +
      '<small>' + err.message + '</small></div>';
    document.getElementById('v-meta').textContent = meta.d + ' · error';
  }
}

// ── Shadowbox ────────────────────────────────────────────────────────────
// Click any <img> in the article → overlay the full-size asset. Substack
// wraps images in <a class="image-link" href="…full-size…">, so prefer that
// href when present; otherwise fall back to img.currentSrc / img.src. We
// intercept at the #content-window level so dynamically-rendered posts
// don't each need their own handler.
(function initLightbox() {
  const box = document.getElementById('lightbox');
  if (!box) return;
  const lbImg = box.querySelector('img');
  const closeBtn = box.querySelector('.lb-close');

  function open(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt || '';
    box.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    box.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('click', (e) => {
    const cw = document.getElementById('content-window');
    if (!cw || !cw.contains(e.target)) return;
    const img = e.target.closest('img');
    if (!img) return;
    // Prefer the Substack-wrapped full-size link if it's an <a class="image-link">
    const link = img.closest('a.image-link, a.image2, a.is-viewable-img');
    const src = (link && link.href) || img.currentSrc || img.src;
    if (!src) return;
    e.preventDefault();
    open(src, img.alt);
  });

  box.addEventListener('click', (e) => {
    // Close when clicking the backdrop, close button, or the image itself.
    if (e.target === box || e.target === lbImg || e.target === closeBtn) close();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && box.classList.contains('open')) close();
  });
})();

// Initial load: URL hash wins (so shared/bookmarked links resolve correctly),
// then saved history.state, then default to root.
(function init() {
  if (location.hash && location.hash.length > 1) {
    const s = stateFromHash(location.hash);
    pushNav(s, true);
    restoreFromState(s);
    return;
  }
  if (history.state && history.state.view) {
    restoreFromState(history.state);
    return;
  }
  pushNav({ view: 'dir', path: '/' }, true);
  render('/');
})();
</script>
