<!DOCTYPE html>
<!-- build: 2026-04-15a -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Index of /</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<!-- Archivo — a grotesque sans used only in the blog post viewer: slightly
     angular, no-nonsense, carries editorial authority without the slab-serif
     weight. Preconnect so the font handshake happens in parallel with the
     first paint; font-display: swap in the @font-face declaration below means
     system-ui renders first and Archivo folds in without a FOUT block. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap">
<style>
/* ── Design tokens ────────────────────────────────────────────────────────
   Dark terminal / autoindex palette. Low-contrast greens on near-black,
   with teal as the only chromatic accent. Hairline 0.5px dividers
   throughout so the grid reads as a file listing rather than a card UI. */
:root {
  --bg:         #0e0e0e;
  --bg-hover:   #141410;
  --fg:         #c9c5b8;
  --fg-strong:  #e8e4d8;
  --fg-name:    #ddd8c8;
  --fg-desc:    #a8a49a;
  --fg-muted:   #5c5c54;
  --fg-faint:   #5a5a52;
  --fg-dim:     #404038;
  --fg-dimmer:  #3a3a32;
  --fg-dimmest: #323228;
  --fg-ghost:   #2e2e26;
  --badge-border: #454540;
  --fg-ink:     #1c1c18;
  --fg-ink-2:   #2a2a24;
  --accent:       #7ab6a0;
  --accent-hover: #9fd1be;
  --accent-bg:    #2d4f46;
  --accent-muted: #2e6657;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  --font-sans: Archivo, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }
html { height: 100%; background: var(--bg); }
body {
  /* Monospace as the base — the whole shell reads as a raw server
     autoindex. The article reader (#content-window) and post-viewer
     title explicitly opt back into a grotesque sans for long-form
     reading; everything else inherits mono. */
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg);
  background: var(--bg);
  padding: 2.5rem 2rem;
  max-width: 960px;
  margin: 0 auto;
  min-height: 100vh;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
h1 {
  font-size: 18px;
  font-weight: 400;
  color: var(--fg-strong);
  letter-spacing: -0.01em;
  border-bottom: 0.5px solid var(--fg-ink-2);
  padding-bottom: 1.25rem;
  margin-bottom: 0;
}
hr { border: none; border-top: 0.5px solid var(--fg-ink); margin: 0; display: none; }
a { cursor: pointer; color: var(--fg-name); }
address {
  font-style: normal;
  font-size: 11px;
  color: var(--fg-dimmest);
  margin-top: 2.5rem;
  padding-top: 1.25rem;
  border-top: 0.5px solid var(--fg-ink);
  display: flex;
  justify-content: space-between;
  gap: 12px;
  letter-spacing: 0.01em;
}
address .sig-accent { color: var(--accent-muted); }
address .server-sig-build { color: var(--accent-muted); }

@media (max-width: 639px) {
  body { padding: 1.75rem 14px 2rem; }
}

/* ── Directory index — dark terminal ────────────────────────────────────────
   A single table, monospaced, with unbracketed type badges (DIR, TXT, APP,
   EXT) rendered as 0.5px-bordered pills. Rows are grid-like — three
   columns (badge, name + description, date) — with hairline dividers and
   a hover state that bleeds to the viewport edge for a tactile,
   file-manager feel. The table is styled so tr.w-row reads as the mockup's
   .entry block with a built-in second row for the description. */
#dir-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
}
#dir-table a { font-family: inherit; }
/* Three columns — badge, name, date. Descriptions render on a second
   full-width row under each entry (aligned with the name column via
   left-padding) so long blurbs can breathe without cramping the grid. */
col.c-icon { width: 58px; }
col.c-name { width: auto; }
col.c-date { width: 108px; }
@media (max-width: 639px) {
  col.c-icon { width: 50px; }
  col.c-date { width: 92px; }
}
/* Hide the table header — the mockup treats the listing as a content grid,
   not a spreadsheet. The dir-title above already labels what the rows are. */
#dir-table thead { display: none; }
#dir-table td {
  padding: 0;
  vertical-align: top;
  word-break: break-word;
}
#dir-table td a { word-break: break-word; overflow-wrap: anywhere; }
/* Type badge: unbracketed DIR/TXT/APP/EXT inside a 0.5px bordered pill.
   Directory badges pick up the teal accent; everything else stays in the
   neutral greyscale so DIRs read as the primary affordance. */
td.w-icon {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  color: var(--fg-dim);
  padding-right: 14px;
}
td.w-icon .type-badge {
  display: inline-block;
  border: 0.5px solid var(--badge-border);
  padding: 3px 5px;
  border-radius: 3px;
  color: var(--fg-muted);
  min-width: 30px;
  text-align: center;
  margin-top: 3px;
}
td.w-icon .type-badge.dir {
  color: var(--accent);
  border-color: var(--accent-bg);
}

/* ── Row layout ─────────────────────────────────────────────────────────────
   Each entry: badge | name (+description on the next row) | date. Hairline
   0.5px dividers between rows. Section headers (tier labels in /writing/)
   read as muted uppercase dividers. */
.w-section td {
  padding: 32px 0 6px;
  border-top: 0.5px solid var(--fg-ink);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-faint);
}
.w-section.first td { border-top: none; padding-top: 10px; }
tr.w-row td {
  padding: 1rem 0 0;
  border-top: 0.5px solid var(--fg-ink);
  vertical-align: top;
}
tr.w-row.first-in-section td { border-top: none; }
td.w-main { padding-right: 16px; }
td.w-main a {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 14px;
  line-height: 1.35;
  color: var(--fg-name);
  text-decoration: none;
  letter-spacing: -0.01em;
}
td.w-main a:hover { color: var(--accent); }
td.w-date {
  white-space: nowrap;
  color: var(--fg-dimmer);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  padding-right: 0;
  padding-top: 4px !important;
  text-align: right;
  letter-spacing: 0.02em;
}
/* Description row — full width under the entry, aligned with the name
   column via left padding. The "Description:" inline label from the old
   apache-style view is dropped; descriptions read as a plain subtitle. */
#dir-table tr.w-desc-row td {
  font-family: var(--font-mono);
  color: var(--fg-desc);
  font-size: 13px;
  line-height: 1.5;
  padding: 4px 0 1.5rem 58px;
  border-top: none;
  vertical-align: top;
  word-break: normal;
  overflow-wrap: anywhere;
  max-width: 100%;
}
@media (max-width: 639px) {
  #dir-table tr.w-desc-row td { padding-left: 50px; }
}
tr.w-desc-row .w-desc-label { display: none; }
/* Parent Directory — navigation chrome, keep it quiet. */
tr.w-parent td { color: var(--fg-dim); }
tr.w-parent td.w-main a {
  color: var(--fg-dim);
  text-decoration: none;
  font-weight: 400;
}
tr.w-parent td.w-main a:hover { color: var(--accent); }
/* Row hover — bleed the background to the edges of the body's inline
   padding (2rem desktop, 14px on narrow viewports). Applied on the whole
   row by negative-margining the first and last cells; since cells are
   inside a single <tr>, we tint each td and let the color run edge-to-edge
   via negative margins on the outermost cells. */
tr.w-row { transition: background-color 120ms ease; }
tr.w-row:hover td { background: var(--bg-hover); }
tr.w-row:hover td.w-icon { box-shadow: -2rem 0 0 var(--bg-hover); }
tr.w-row:hover td.w-date { box-shadow:  2rem 0 0 var(--bg-hover); }
@media (max-width: 639px) {
  tr.w-row:hover td.w-icon { box-shadow: -14px 0 0 var(--bg-hover); }
  tr.w-row:hover td.w-date { box-shadow:  14px 0 0 var(--bg-hover); }
}
/* Footer count line — muted monospace, same family as the server sig. */
tr.w-count td {
  padding: 1.25rem 0 2px;
  font-size: 11px;
  color: var(--fg-muted);
  border-top: 0.5px solid var(--fg-ink);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

/* ── Breadcrumb → site label ────────────────────────────────────────────────
   On the root, breadcrumb is empty; the site-label ("mikelacy.site") sits
   above the title. The renderBreadcrumb() JS injects link children, which
   we style as accent-teal. */
#breadcrumb {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-faint);
  margin-bottom: 2rem;
  line-height: 1.5;
}
#breadcrumb a { color: var(--accent); text-decoration: none; }
#breadcrumb a:hover { color: var(--accent-hover); }
#breadcrumb .sep { color: var(--fg-ghost); margin: 0 3px; }
#breadcrumb .cur { color: var(--fg-muted); }
.site-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-faint);
  margin-bottom: 2rem;
}
.site-label a { color: var(--accent); text-decoration: none; }
.site-label a:hover { color: var(--accent-hover); }

/* The listing stretches to the full 900px body so columns can breathe,
   but the reading viewers stay at a tighter column width for legibility. */
#viewer, #textviewer, #embedviewer { display: none; max-width: 560px; margin: 0 auto; }

/* Unified viewer header — matches the listing's h1 treatment (mono 18px,
   400-weight, hairline bottom border) so every view — index, post, text,
   embed — wears the same "Apache autoindex" chrome. Filename on the left,
   date/meta on the right, baseline-aligned; wraps on narrow viewports so
   the meta tucks under the filename instead of colliding. */
.v-chrome {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px;
  padding-bottom: 1.25rem;
  margin-bottom: 0;
  border-bottom: 0.5px solid var(--fg-ink-2);
}
.v-filename {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--fg-strong);
  word-break: break-word;
  overflow-wrap: anywhere;
}
.v-meta {
  font-family: var(--font-mono);
  color: var(--fg-muted);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.01em;
  text-align: right;
  white-space: nowrap;
}

#content-window, #text-window {
  overflow-y: auto;
  overflow-x: hidden;
  height: calc(100vh - 130px);
  min-height: 380px;
  padding: 16px 0 0;
  margin-top: 8px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
#text-window pre {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 13px;
  line-height: 1.6;
  color: var(--fg);
  margin: 0;
}
#tv-body {
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg);
  word-break: break-word;
  overflow-wrap: break-word;
}
#tv-body h1, #tv-body h2, #tv-body h3, #tv-body h4 {
  font-family: var(--font-mono);
  font-weight: 600; letter-spacing: -0.01em;
  margin: 1.6em 0 .4em; line-height: 1.25; color: var(--fg-strong);
}
#tv-body h1 { font-size: 20px; }
#tv-body h2 { font-size: 17px; }
#tv-body h3 { font-size: 15px; }
#tv-body p  { margin: 0 0 1em; }
#tv-body ul, #tv-body ol { margin: 0 0 1em 1.3em; }
#tv-body li { margin-bottom: 0.35em; }
#tv-body hr { border: none; border-top: 0.5px solid var(--fg-ink); margin: 1.4em 0; }
#tv-body a  { color: var(--accent); word-break: break-word; overflow-wrap: anywhere; }
#tv-body a:hover { color: var(--accent-hover); }
#tv-body code {
  background: var(--fg-ink); padding: 0 3px;
  color: var(--fg-strong);
  font-size: 12.5px;
}
#tv-body strong { font-weight: 600; color: var(--fg-strong); }
#tv-body em { font-style: italic; }

/* Reading body — grotesque sans tuned for accountability reporting: short
   lines skim fast, links don't fragment paragraphs (they inherit text color
   with a 1px underline offset 3px off the baseline), and the whole column
   uses one font so the eye isn't constantly switching registers between
   body, headings, and inline UI widgets (subscribe, file-embed, pullquote). */
#content-window {
  color: var(--fg-strong);
  font-family: var(--font-sans);
}
#content-window p {
  font-size: 16px; line-height: 1.7; margin: 0 0 1.15em; color: var(--fg-strong);
  word-wrap: break-word; overflow-wrap: break-word;
}
#content-window a {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: rgba(122,182,160,0.4);
  word-break: break-word; overflow-wrap: anywhere;
}
#content-window a:hover { color: var(--accent-hover); text-decoration-color: var(--accent-hover); }
#content-window blockquote {
  border-left: 3px solid var(--accent); margin: 1.5em 0; padding: 0.1em 0 0.1em 18px;
  color: var(--fg);
}
#content-window blockquote p { font-style: italic; font-size: 16px; line-height: 1.6; color: var(--fg); }
#content-window h1, #content-window h2, #content-window h3, #content-window h4 {
  font-family: inherit;
  font-weight: 600; letter-spacing: -0.018em;
  margin: 1.8em 0 .5em; line-height: 1.2; color: var(--fg-strong);
}
#content-window h1 { font-size: 24px; }
#content-window h2 { font-size: 20px; }
#content-window h3 { font-size: 17px; }
#content-window hr { border: none; border-top: 0.5px solid var(--fg-ink); margin: 2em auto; width: 40%; }

/* Images: default to ~2/3 of the column, centered, with a zoom cursor so
   readers know the shadowbox is available. On narrow viewports we let them
   breathe full-width — 2/3 of a phone is too small to see. */
#content-window figure { margin: 1.8em auto; max-width: 100%; text-align: center; }
#content-window img {
  display: block;
  width: 66.6667%;
  max-width: 100%;
  height: auto;
  margin: 0 auto;
  cursor: zoom-in;
  border-radius: 2px;
}
@media (max-width: 639px) {
  #content-window img { width: 100%; }
}
#content-window figcaption,
#content-window .image-caption {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg-muted);
  line-height: 1.5;
  margin-top: 8px;
  text-align: center;
  font-style: normal;
}
#content-window ul, #content-window ol {
  font-size: 16px; line-height: 1.7; margin: 0 0 1.15em 1.4em;
}
#content-window li { margin-bottom: 0.45em; word-wrap: break-word; overflow-wrap: break-word; }
#content-window pre {
  font-size: 12.5px;
  background: var(--fg-ink); border: 0.5px solid var(--fg-ink-2);
  color: var(--fg-strong);
  padding: 10px 12px; overflow-x: auto; margin: 1em 0;
  white-space: pre-wrap;
  word-break: break-word;
}
#content-window code {
  font-size: 12.5px;
  background: var(--fg-ink); color: var(--fg-strong); padding: 0 3px;
  word-break: break-word;
}
#content-window pre code { background: none; padding: 0; }
#content-window video, #content-window iframe {
  max-width: 100%; height: auto; display: block;
}
/* Substack wraps images in an <a class="image-link"> that points to the
   full-size asset. We intercept that click for the shadowbox, but keep the
   anchor styled as a plain image (no underline, inherit block layout). */
#content-window a.image-link,
#content-window a.image-link:hover {
  display: block;
  text-decoration: none;
  border: 0;
}
#content-window .captioned-image-container figure { text-align: center; }
#content-window .captioned-image-container img { margin: 0 auto; }

#e-frame { width: 100%; height: calc(100vh - 130px); min-height: 420px; border: 0.5px solid var(--fg-ink-2); background: var(--bg); margin-top: 8px; }

/* ── embed (APP) viewer — full-bleed ───────────────────────────────────────
   Apps aren't prose; the 560px reading column strangles them. When the
   embedviewer is the active pane, break it out of the body's 960px cap
   and span the full viewport so iframes (e.g. the invoice viewer) have
   room to actually be used. The chrome (filename, meta, open-in-new-tab)
   stays centered within the normal 960px rhythm so the header reads the
   same as every other view. An "open in new tab ↗" link sits in the
   chrome so visitors who'd rather use the app in its own window can. */
#embedviewer {
  max-width: none;
  width: 100vw;
  position: relative;
  left: 50%;
  right: 50%;
  margin-left: -50vw;
  margin-right: -50vw;
  padding: 0 2rem;
  box-sizing: border-box;
}
#embedviewer > .v-chrome,
#embedviewer > hr,
#embedviewer > address.server-sig {
  max-width: 960px;
  margin-left: auto;
  margin-right: auto;
}
@media (max-width: 639px) {
  #embedviewer { padding: 0 14px; }
}
.v-open-ext {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
  margin-left: 10px;
}
.v-open-ext:hover { color: var(--accent-hover); }

.loading { color: var(--fg-muted); font-style: italic; padding: 16px 0; }
.error { color: #d98f8f; padding: 16px 0; }

/* ── Substack-post embedded widgets ─────────────────────────────────────── */

/* Subscribe form — a 3px left rule instead of a full border box. Gives the
   CTA visual separation from body prose without a card/background that would
   scream "advertisement." Action content sits on the left; the secondary
   "follow on social" line inside .preamble drops a step in size + color so
   the primary ask reads first. */
#content-window .subscription-widget-wrap-editor,
#content-window .subscription-widget-wrap { margin: 1.5em 0; }
#content-window .subscription-widget {
  border: none;
  border-left: 3px solid var(--accent);
  padding: 6px 0 6px 18px;
  text-align: left;
}
#content-window .subscription-widget .preamble {
  margin-bottom: 10px;
  font-size: 13px;
  color: var(--fg-muted);
  line-height: 1.5;
}
#content-window .subscription-widget .cta-caption {
  font-size: 15px;
  line-height: 1.5;
  margin: 0 0 10px;
  font-style: normal;
  font-weight: 500;
  color: var(--fg-strong);
}
#content-window .subscription-widget-subscribe {
  display: flex;
  gap: 6px;
  align-items: stretch;
  flex-wrap: wrap;
  justify-content: flex-start;
}
#content-window .subscription-widget-subscribe .email-input {
  flex: 1 1 220px;
  min-width: 0;
  font: inherit;
  font-size: 13px;
  padding: 6px 8px;
  border: 0.5px solid var(--fg-ink-2);
  background: var(--fg-ink);
  color: var(--fg-strong);
}
#content-window .subscription-widget-subscribe .email-input::placeholder { color: var(--fg-muted); }
#content-window .subscription-widget-subscribe .button.primary,
#content-window .button.primary {
  display: inline-block;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  background: var(--accent);
  color: var(--bg);
  border: 0.5px solid var(--accent);
  text-decoration: none;
  cursor: pointer;
  letter-spacing: 0.005em;
}
#content-window .subscription-widget-subscribe .button.primary:hover,
#content-window .button.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}
#content-window .fake-input-wrapper { display: none; }

/* Button-wrapper (e.g. "Python Script" download) */
#content-window .button-wrapper { margin: 1.4em 0; }
#content-window .button-wrapper a.button.primary span { color: inherit; }
#content-window .button-wrapper a.button.primary { text-decoration: none; }

/* Pullquotes */
#content-window .pullquote {
  border-left: 2px solid var(--fg-ink-2);
  margin: 1.4em 0;
  padding: 0 14px;
  color: var(--fg);
}
#content-window .pullquote p {
  font-size: 15px;
  line-height: 1.55;
  margin-bottom: 0.5em;
  font-style: italic;
}
#content-window .pullquote p:last-child { margin-bottom: 0; }
#content-window .pullquote strong { font-style: normal; }

/* Inline "digest" / recommended post embed */
#content-window .digest-post-embed {
  display: none; /* metadata-only node; has no rendered content without Substack JS */
}

/* Image captions improved */
#content-window .image-caption {
  font-size: 11px;
  color: var(--fg-muted);
  margin-top: 4px;
  text-align: center;
}
#content-window .captioned-image-container figure { text-align: center; }
#content-window .captioned-image-container img { margin: 0 auto; }

/* Hide non-functional image overlay action buttons (Substack restack/expand) */
#content-window .image-link-expand,
#content-window .pencraft.icon-container { display: none !important; }

/* YouTube embeds */
#content-window .youtube-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
  margin: 1.4em 0;
  background: #000;
  overflow: hidden;
}
#content-window .youtube-wrap .youtube-inner,
#content-window .youtube-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
  border: 0;
}

/* Native video placeholder (shows nothing meaningful without JS) */
#content-window .native-video-embed:empty { display: none; }

/* File-embed widget (PDF / attachment download cards) */
#content-window .file-embed-wrapper { margin: 1.4em 0; }
#content-window .file-embed-container-reader {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 0.5px solid var(--fg-ink-2);
  background: var(--bg-hover);
  padding: 12px 14px;
  border-radius: 4px;
}
#content-window .file-embed-container-top {
  display: contents; /* let children participate in the flex row directly */
}
#content-window .file-embed-thumbnail-default {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  display: block;
}
#content-window .file-embed-details {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#content-window .file-embed-details-h1 {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--fg-strong);
  word-break: break-word;
  overflow-wrap: anywhere;
}
#content-window .file-embed-details-h2 {
  font-size: 11.5px;
  color: var(--fg-muted);
  letter-spacing: 0.01em;
}
/* Download button: lighter outline rather than filled-black. At this size a
   solid button dominates the card visually relative to what it is — a
   secondary "here's the underlying file" offer. Outline keeps it tappable
   and obvious without stealing the reader's eye from the article body. */
#content-window .file-embed-button {
  flex: 0 0 auto;
  display: inline-block;
  font-size: 12.5px;
  font-weight: 600;
  padding: 5px 12px;
  background: transparent;
  color: var(--accent);
  border: 0.5px solid var(--accent-bg);
  text-decoration: none;
  cursor: pointer;
  white-space: nowrap;
}
#content-window .file-embed-button:hover {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
#content-window .file-embed-button-text { color: inherit; }
/* Substack ships both wide+narrow buttons; show only one to avoid duplicates. */
#content-window .file-embed-button.narrow { display: none; }
@media (max-width: 520px) {
  #content-window .file-embed-container-reader {
    flex-wrap: wrap;
  }
  #content-window .file-embed-button.wide { display: none; }
  #content-window .file-embed-button.narrow {
    display: inline-block;
    width: 100%;
    text-align: center;
    margin-top: 4px;
  }
}

@media (max-width: 520px) {
  #content-window .subscription-widget-subscribe .email-input { flex-basis: 100%; }
  #content-window .subscription-widget-subscribe .button.primary { flex: 1 1 100%; }
}

/* Desktop: a comfortable reading column. Sans-serif chrome (index, tables,
   metadata) goes a touch bigger; the serif article body bumps up to the
   ~19px Substack sits at, capped near 68ch so lines don't sprawl. */
@media (min-width: 768px) {
  body { max-width: 960px; padding: 2.5rem 2rem; font-size: 14px; }
  h1 { font-size: 18px; }
  #breadcrumb { font-size: 11px; }
  th, td { font-size: 14px; }
  #content-window p,
  #content-window ul,
  #content-window ol { font-size: 17px; line-height: 1.7; }
  #content-window h1 { font-size: 28px; }
  #content-window h2 { font-size: 22px; }
  #content-window h3 { font-size: 18px; }
  #content-window blockquote p { font-size: 17px; }
  #text-window pre { font-size: 14px; max-width: 80ch; }

  /* Cap reading-text blocks near ~68ch — Substack-ish — so lines stay
     scannable on wide screens. Figures are intentionally NOT capped so
     they keep their 2/3 proportion relative to the full column. */
  #content-window p,
  #content-window ul,
  #content-window ol,
  #content-window blockquote,
  #content-window h1,
  #content-window h2,
  #content-window h3,
  #content-window h4,
  #content-window pre,
  #content-window .pullquote,
  #content-window .subscription-widget-wrap,
  #content-window .subscription-widget-wrap-editor,
  #content-window .file-embed-wrapper,
  #content-window .button-wrapper {
    max-width: 68ch;
    margin-left: auto;
    margin-right: auto;
  }
}

/* ── Shadowbox / lightbox ─────────────────────────────────────────────────
   Click any article image → full-size overlay. No dependencies, no
   third-party JS; just a fixed overlay with the image centered and a
   close-on-click / close-on-escape contract. */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: zoom-out;
  padding: 24px;
  animation: lb-fade 140ms ease-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  border-radius: 2px;
  cursor: zoom-out;
}
#lightbox .lb-close {
  position: absolute;
  top: 14px;
  right: 18px;
  font: 600 22px/1 ui-sans-serif, system-ui, sans-serif;
  color: #eee;
  background: transparent;
  border: 0;
  padding: 6px 10px;
  cursor: pointer;
  opacity: 0.75;
}
#lightbox .lb-close:hover { opacity: 1; }
@keyframes lb-fade { from { opacity: 0 } to { opacity: 1 } }

/* ── Rich Text (Substack) right-side widget ────────────────────────────────
   A small floating feed card pinned to the upper-right. Only shows on
   viewports with headroom (the main column is capped at 960px centered;
   below ~1280px there isn't room without overlapping the index table). */
#rt-widget { display: none; }
@media (min-width: 1280px) {
  #rt-widget {
    display: block;
    position: fixed;
    top: 24px;
    right: 24px;
    width: 300px;
    z-index: 100;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
}
#rt-widget .rtw { border: 0.5px solid var(--fg-ink-2); border-radius: 6px; background: var(--bg-hover); overflow: hidden; }
#rt-widget .rtw-h { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border-bottom: 0.5px solid var(--fg-ink); cursor: pointer; user-select: none; gap: 10px; }
#rt-widget.collapsed .rtw-h { border-bottom: none; }
#rt-widget .rtw-hl { font-size: 11px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); flex-shrink: 0; }
#rt-widget .rtw-latest { font-size: 11px; color: var(--fg-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: none; }
#rt-widget.collapsed .rtw-latest { display: block; }
#rt-widget .rtw-toggle { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; color: var(--fg-muted); transition: transform .2s ease; flex-shrink: 0; }
#rt-widget.collapsed .rtw-toggle { transform: rotate(-90deg); }
#rt-widget .rtw-ha { display: flex; align-items: center; color: var(--fg-muted); text-decoration: none; flex-shrink: 0; }
#rt-widget .rtw-ha:hover { color: var(--accent); }
#rt-widget #rt-body { max-height: 460px; overflow: hidden; transition: max-height .25s ease; }
#rt-widget.collapsed #rt-body { max-height: 0; }
#rt-widget .rtw-pi { padding: 9px 13px; border-bottom: 0.5px solid var(--fg-ink); cursor: pointer; }
#rt-widget .rtw-pi:hover { background: var(--fg-ink); }
#rt-widget .rtw-pi:last-child { border-bottom: none; }
#rt-widget .rtw-pt { font-size: 13px; font-weight: 500; color: var(--fg-name); margin: 0 0 2px; line-height: 1.3; }
#rt-widget .rtw-pd { font-size: 11px; color: var(--fg-dimmer); margin: 0; }
#rt-widget .rtw-f { display: flex; align-items: center; justify-content: space-between; padding: 7px 13px; border-top: 0.5px solid var(--fg-ink); }
#rt-widget .rtw-count { font-size: 11px; color: var(--fg-muted); }
#rt-widget .rtw-n { background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; color: var(--fg-muted); font-size: 15px; line-height: 1; }
#rt-widget .rtw-n:hover { background: var(--fg-ink); color: var(--accent); }
#rt-widget .rtw-n:disabled { opacity: .25; cursor: default; }
#rt-widget .rtw-load { padding: 20px 13px; font-size: 12px; color: var(--fg-muted); text-align: center; }

/* ── #viewer modal overlay mode ─────────────────────────────────────────────
   When a Substack-widget item is clicked we reuse the existing #viewer +
   #content-window so the formatting matches /writing/ posts exactly — just
   overlay it as a modal rather than replacing the page. */
#viewer-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9998;
}
#viewer-backdrop.open { display: block; }
#viewer.modal-mode {
  /* Narrow centered column — articles should feel like a reading modal
     layered over the listing, not a full-bleed overlay. */
  position: fixed;
  inset: 32px auto 32px 50%;
  transform: translateX(-50%);
  width: min(680px, calc(100vw - 32px));
  background: var(--bg);
  color: var(--fg);
  z-index: 9999;
  overflow: auto;
  padding: 28px 32px 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  border: 0.5px solid var(--fg-ink-2);
  max-width: none;
  margin: 0;
}
#viewer.modal-mode #content-window {
  height: auto;
  min-height: 0;
  overflow: visible;
}
#viewer-modal-close {
  display: none;
  position: absolute;
  top: 10px;
  right: 14px;
  background: transparent;
  border: 0;
  font: 600 22px/1 var(--font-sans);
  color: var(--fg-muted);
  cursor: pointer;
  padding: 6px 10px;
  z-index: 2;
}
#viewer.modal-mode #viewer-modal-close { display: block; }
#viewer-modal-close:hover { color: var(--accent); }
@media (max-width: 639px) {
  #viewer.modal-mode {
    top: 8px; bottom: 8px;
    width: calc(100vw - 16px);
    padding: 24px 14px 28px;
  }
}

/* ── README preface ────────────────────────────────────────────────────────
   Pinned above the directory listing on the root view. Renders the site's
   README.md through the same markdown pipeline as the text viewer so "who is
   this site" reads first, before visitors have to click anything. */
#readme-preface {
  display: none;
  margin-bottom: 1.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 0.5px solid var(--fg-ink-2);
}
#readme-preface.show { display: block; }
#readme-preface.is-expanded {
  margin-bottom: 2.25rem;
  padding-bottom: 2.25rem;
}
#readme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 6px 0;
  background: none;
  border: none;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: left;
  cursor: pointer;
}
#readme-toggle:hover { color: var(--accent); }
#readme-toggle .readme-caret {
  display: inline-flex;
  transition: transform 0.15s ease;
}
#readme-preface.is-expanded #readme-toggle .readme-caret { transform: rotate(90deg); }
#readme-body { margin-top: 1rem; }
#readme-body[hidden] { display: none; }
#readme-body > :first-child { margin-top: 0; }
#readme-body > :last-child { margin-bottom: 0; }
#readme-preface h1,
#readme-preface h2,
#readme-preface h3 {
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg-strong);
  line-height: 1.25;
}
#readme-preface h1 { font-size: 20px; margin: 0 0 1rem; }
#readme-preface h2 {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-faint);
  margin: 1.6em 0 .6em;
  font-weight: 500;
}
#readme-preface h3 { font-size: 14px; margin: 1.2em 0 .4em; }
#readme-preface p {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--fg);
  margin: 0 0 0.9em;
}
#readme-preface ul,
#readme-preface ol {
  font-size: 13.5px;
  line-height: 1.65;
  margin: 0 0 0.9em 1.3em;
  color: var(--fg);
}
#readme-preface li { margin-bottom: 0.3em; }
#readme-preface a {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: rgba(122,182,160,0.35);
}
#readme-preface a:hover { color: var(--accent-hover); text-decoration-color: var(--accent-hover); }
#readme-preface strong { color: var(--fg-strong); font-weight: 600; }
#readme-preface em { font-style: italic; }
#readme-preface hr { border: none; border-top: 0.5px solid var(--fg-ink); margin: 1.4em 0; }
#readme-preface code {
  background: var(--fg-ink);
  color: var(--fg-strong);
  padding: 0 3px;
  font-size: 12.5px;
}

/* ── EO promo ─────────────────────────────────────────────────────────────
   Compact teaser between the About dropdown and the directory listing.
   Links to the local Operator Helix animation and the off-site EO wiki. */
#eo-promo {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 6px 12px;
  margin-bottom: 1.5rem;
  padding: 0.85rem 0;
  border-top: 0.5px solid var(--fg-ink-2);
  border-bottom: 0.5px solid var(--fg-ink-2);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
}
#eo-promo .eo-tag {
  color: var(--accent-muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 0.5px solid var(--badge-border);
  border-radius: 2px;
  flex-shrink: 0;
}
#eo-promo .eo-title {
  color: var(--fg-strong);
  font-weight: 600;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: rgba(122,182,160,0.35);
}
#eo-promo .eo-title:hover {
  color: var(--accent-hover);
  text-decoration-color: var(--accent-hover);
}
#eo-promo .eo-desc { color: var(--fg-desc); }
#eo-promo .eo-wiki {
  margin-left: auto;
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: rgba(122,182,160,0.35);
}
#eo-promo .eo-wiki:hover {
  color: var(--accent-hover);
  text-decoration-color: var(--accent-hover);
}
@media (max-width: 639px) {
  #eo-promo .eo-wiki { margin-left: 0; }
}

/* ── Inline expansion rows ────────────────────────────────────────────────
   When a root-level entry is clicked we reveal its underlying content in
   place instead of navigating. The expansion row spans all three columns,
   left-padded to align with the name column so the content visually belongs
   to the row above. */
tr.w-expansion td {
  padding: 2px 0 1.5rem 58px;
  border-top: none;
  background: rgba(255,255,255,0.012);
  vertical-align: top;
}
@media (max-width: 639px) {
  tr.w-expansion td { padding-left: 50px; }
}
tr.w-expansion .exp-wrap { padding-right: 8px; }
tr.w-expansion .exp-section {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-faint);
  font-weight: 500;
  margin: 14px 0 6px;
}
tr.w-expansion .exp-section:first-child { margin-top: 2px; }
tr.w-expansion .exp-row {
  display: grid;
  grid-template-columns: 44px 1fr 92px;
  gap: 10px;
  padding: 8px 0;
  border-top: 0.5px solid var(--fg-ink);
  cursor: pointer;
  transition: background-color 120ms ease;
}
tr.w-expansion .exp-row:hover { background: var(--bg-hover); }
tr.w-expansion .exp-row.first { border-top: none; }
tr.w-expansion .exp-badge {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 0.5px solid var(--badge-border);
  padding: 3px 5px;
  border-radius: 3px;
  color: var(--fg-muted);
  height: fit-content;
  text-align: center;
  margin-top: 1px;
  min-width: 30px;
}
tr.w-expansion .exp-badge.dir  { color: var(--accent); border-color: var(--accent-bg); }
tr.w-expansion .exp-body { min-width: 0; }
tr.w-expansion .exp-name {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 13.5px;
  color: var(--fg-name);
  text-decoration: none;
  display: block;
  word-break: break-word;
  letter-spacing: -0.01em;
}
tr.w-expansion .exp-row:hover .exp-name { color: var(--accent); }
tr.w-expansion .exp-desc {
  font-family: var(--font-mono);
  color: var(--fg-desc);
  font-size: 12.5px;
  line-height: 1.5;
  margin-top: 3px;
  word-break: normal;
  overflow-wrap: anywhere;
}
tr.w-expansion .exp-date {
  white-space: nowrap;
  color: var(--fg-dimmer);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  text-align: right;
  padding-top: 3px;
  letter-spacing: 0.02em;
}
tr.w-expansion .exp-pre {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--fg);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 0;
  padding-right: 8px;
}
tr.w-expansion .exp-pre a { color: var(--accent); }
tr.w-expansion .exp-pre a:hover { color: var(--accent-hover); }
tr.w-expansion .exp-loading {
  color: var(--fg-muted);
  font-style: italic;
  font-size: 12.5px;
  padding: 8px 0;
}

/* When a row is expanded, highlight its name so the open/closed state is
   obvious at a glance without needing a caret column. */
tr.w-row.is-expanded td.w-main a { color: var(--accent); }
</style>
</head>
<body>

<div id="breadcrumb"></div>

<div id="listing">
  <!-- README preface — populated and shown only on the root view. Lives
       inside #listing so it gets hidden automatically whenever the listing
       is replaced by the post/text/embed viewers. -->
  <div id="readme-preface" aria-label="About Mike Lacy">
    <button type="button" id="readme-toggle" aria-expanded="false" aria-controls="readme-body">
      <span class="readme-caret" aria-hidden="true">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span>About</span>

  <aside id="eo-promo" aria-label="Experiential Ontology">

    <span class="eo-desc">— an animation of EO's nine operators.</span>
    <a class="eo-wiki" href="https://experientialontology.org/" target="_blank" rel="noopener">EO wiki ↗</a>
  </aside>
  <h1 id="dir-title">Index of /</h1>

    </colgroup>

        <th class="icon">[ICO]</th>

        <th class="date">Last modified</th>
      </tr>
    </thead>

  </table>
  <hr>
  <address class="server-sig"></address>
</div>

<div id="viewer">
  <button type="button" id="viewer-modal-close" aria-label="Close">×</button>
  <div class="v-chrome">
    <span class="v-filename" id="v-filename"></span>
    <span class="v-meta" id="v-meta"></span>

<!-- Rich Text (Substack) right-side widget. Fetches the substack RSS feed
     via an n8n webhook proxy (RSS → JSON); on click, opens the post as an
     overlay modal that reuses #viewer so formatting matches /writing/ posts. -->
<aside id="rt-widget" class="collapsed" aria-label="Rich Text feed">
  <div class="rtw">
    <div class="rtw-h" id="rtw-header" role="button" tabindex="0" aria-expanded="false" aria-controls="rt-body">
      <span class="rtw-hl">Rich Text</span>
      <span class="rtw-latest" id="rtw-latest"></span>
      <span class="rtw-toggle" aria-hidden="true">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <a href="https://readrichtext.substack.com" class="rtw-ha" target="_blank" rel="noopener" aria-label="Open on Substack">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11L11 2M11 2H5.5M11 2V7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
    <div id="rt-body"><div class="rtw-load">Loading…</div></div>
