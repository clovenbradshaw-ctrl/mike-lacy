  const parts = path.replace(/\/$/, "").split("/");
  parts.pop();
  return parts.length <= 1 ? "/" : parts.join("/") + "/";
}

function show(id) {
  // Explicit "block" — the stylesheet has `display:none` on #viewer/#textviewer/#embedviewer,
  // so we cannot just clear the inline style or the pane stays hidden.
  ["listing","viewer","textviewer","embedviewer"].forEach(x => {
    document.getElementById(x).style.display = x === id ? "block" : "none";
  });
}

// ── nav wrappers: push a history entry, then show the view ───────────────────
function goDir(path)             { pushNav({view:'dir',   path}); render(path); }
function goPost(meta, fromP)     { pushNav({view:'post',  file:meta.f, fromP}); openPost(meta, fromP); }
function goText(name, fromP)     { pushNav({view:'text',  name, fromP}); openText(name, fromP); }
function goEmbed(item, fromP)    {
  pushNav({view:'embed', name:item.name, src:item.src, date:item.date, desc:item.desc, fromP});
  openEmbed(item, fromP);
}

function renderBreadcrumb(path, filename) {
  const bc = document.getElementById("breadcrumb");
  const parts = path === "/" ? [] : path.replace(/^\//, "").replace(/\/$/, "").split("/");
  let html = '<a href="#" data-path="/">mikelacy.site</a>';
  let built = "/";
  parts.forEach(part => {
    built = built === "/" ? "/" + part + "/" : built + part + "/";
    html += '<span class="sep">/</span><a href="#" data-path="' + built + '">' + part + '</a>';
  });
  if (filename) html += '<span class="sep">/</span><span class="cur">' + filename + '</span>';
  bc.innerHTML = html;
  bc.querySelectorAll('a[data-path]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); goDir(a.dataset.path); });
  });
}

// ── Apache-style directory render ───────────────────────────────────────────
// A single table per directory, rendered in the shape mod_autoindex would
// emit: bracketed icon tag, name, last-modified date — with descriptions on
// a full-width row underneath each entry. /writing/ gets tier-section headers
// inlined into the same tbody. Navigation, history, and viewer handoffs are
// handled elsewhere — this function only paints the listing.

const ESC = s => String(s).replace(/[&<>"']/g, c => (
  { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
));

// Unbracketed type badge inside a 0.5px-bordered pill (rendered by the
// .type-badge CSS). Directories pick up the teal accent modifier so DIRs
// read as the primary affordance in the listing. Posts get an empty badge
// — they read as articles, not files — but the slot stays reserved so the
// three-column grid keeps its alignment.
function iconFor(type) {
  const label =
      type === "dir"   ? "DIR"
    : type === "link"  ? "EXT"
    : type === "embed" ? "APP"
    : type === "file"  ? "TXT"
    : type === "post"  ? "POST"
    :                    "";
  const cls = type === "dir" ? "type-badge dir" : "type-badge";
  return `<span class="${cls}">${label}</span>`;
}

// Parent-directory row — styled consistently with the w-row layout so every
// directory listing shares the same visual rhythm as /writing/.
function parentDirRow(onClick) {
  const tr = document.createElement("tr");
  tr.className = "w-row w-parent first-in-section";
  tr.innerHTML =
    `<td class="w-icon"><span class="type-badge">UP</span></td>` +
    `<td class="w-main"><a href="#">Parent Directory</a></td>` +
    `<td class="w-date">—</td>`;
  tr.querySelector("a").addEventListener("click", e => { e.preventDefault(); onClick(); });
  return tr;
}

// ── /writing/ custom view ────────────────────────────────────────────────────

function renderWriting() {
  show("listing");
  document.title = "Index of /writing/";
  document.getElementById("dir-title").textContent = "Index of /writing/";
  const tbody = document.getElementById("dir-body");
  tbody.innerHTML = "";

  tbody.appendChild(parentDirRow(() => goDir("/")));

  const tierNames = {
    1: "TIER 1 — POSTS THAT CHANGED NASHVILLE POLICY",
    2: "TIER 2 — MAJOR INVESTIGATIONS & EXTERNAL PUBLICATION",
    3: "TIER 3 — DEEP INVESTIGATIONS & SERIES ANCHORS",
    4: "TIER 4 — PHILOSOPHY, VOICE, IDENTITY",
  };

  // Pre-group posts by tier so we can both (a) render counts in the section
  // headers and (b) build the rows without iterating twice.
  const postsByTier = { 1:[], 2:[], 3:[], 4:[] };
  POSTS.forEach(p => { if (postsByTier[p.tier]) postsByTier[p.tier].push(p); });
  [1,2,3,4].forEach(t => postsByTier[t].sort((a,b) => b.d.localeCompare(a.d)));

  [1,2,3,4].forEach((tier, tierIdx) => {
    const posts = postsByTier[tier];
    const sec = document.createElement("tr");
    sec.className = "w-section" + (tierIdx === 0 ? " first" : "");
    sec.id = "t" + tier;
    sec.innerHTML = `<td colspan="3">${tierNames[tier]}</td>`;
    tbody.appendChild(sec);

    posts.forEach((p, i) => {
      // Row anchor id derived from post filename's slug portion. Invisible
      // unless someone deep-links with "#p-<slug>"; no router impact because
      // the hash router only matches "/writing/<file>" shapes.
      const slug = p.f.replace(/^\d+\./, "").replace(/\.html$/, "").replace(/\.md$/, "");
      const tr = document.createElement("tr");
      tr.className = "w-row" + (i === 0 ? " first-in-section" : "");
      tr.id = "p-" + slug;
      tr.innerHTML =
        `<td class="w-icon">${iconFor("post")}</td>` +
        `<td class="w-main"><a href="#">${ESC(p.t)}</a></td>` +
        `<td class="w-date">${p.d}</td>`;
      const open = () => goPost(p, "/writing/");
      tr.querySelector("a").addEventListener("click", e => { e.preventDefault(); open(); });
      tbody.appendChild(tr);
      // Description row — full width under the post, prefixed with an inline
      // "Description:" label so the text starts on the same line as the word.
      // Clicking anywhere on the row opens the post.
      if (p.desc) {
        const dtr = document.createElement("tr");
        dtr.className = "w-desc-row";
        dtr.innerHTML =
          `<td colspan="3"><span class="w-desc-label">Description:</span>${ESC(p.desc)}</td>`;
        dtr.style.cursor = "pointer";
        dtr.addEventListener("click", open);
        tbody.appendChild(dtr);
      }
    });
  });

  // Footer count line — reads like something an index generator would print.
  const lastUpdated = POSTS.reduce((a, p) => p.d > a ? p.d : a, "");
  const count = document.createElement("tr");
  count.className = "w-count";
  count.innerHTML =
    `<td colspan="3">/writing/ — ${POSTS.length} entries, last updated ${lastUpdated}</td>`;
  tbody.appendChild(count);
}

// ── README preface ──────────────────────────────────────────────────────────
// Pinned above the root listing. Fetched once and cached; subsequent renders
// just toggle the `show` class so there's no re-fetch thrash as the visitor
// navigates in and out of the root.

let README_CACHE = null;
let README_FETCH = null;

function renderReadmePreface() {
  const host = document.getElementById("readme-preface");
  const body = document.getElementById("readme-body");
  if (!host || !body) return;
  host.classList.add("show");
  if (README_CACHE !== null) { body.innerHTML = README_CACHE; return; }
  if (README_FETCH) return; // fetch in flight, don't double-fire
  body.innerHTML = '<p class="loading">Loading…</p>';
  README_FETCH = fetch("./README.md", { cache: "no-cache" })
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(txt => {
      README_CACHE = renderMarkdown(txt);
      body.innerHTML = README_CACHE;
      body.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || '';
        if (/^https?:/i.test(href)) { a.target = '_blank'; a.rel = 'noopener'; }
        // Internal markdown links like ./projects/... stay as plain anchors;
        // we don't hijack them because there's no in-app viewer for them yet.
      });
    })
    .catch(() => { body.textContent = "[README.md could not be loaded]"; });
}

// Wire the collapsible About toggle. Starts collapsed on every load; the
// expansion state isn't persisted because the preface is short and visitors
// usually want the listing first.
(function initReadmeToggle() {
  const host = document.getElementById("readme-preface");
  const btn = document.getElementById("readme-toggle");
  const body = document.getElementById("readme-body");
  if (!host || !btn || !body) return;
  btn.addEventListener("click", () => {
    const expanded = host.classList.toggle("is-expanded");
    btn.setAttribute("aria-expanded", String(expanded));
    if (expanded) body.removeAttribute("hidden");
    else body.setAttribute("hidden", "");
  });
})();

function hideReadmePreface() {
  const host = document.getElementById("readme-preface");
  if (host) host.classList.remove("show");
}

// ── inline-expansion state ──────────────────────────────────────────────────
// Tracks which root-level entries are currently expanded so re-renders (e.g.
// after a popstate back to root) restore the open state without the visitor
// having to re-click.
const expandedRoot = new Set();

// ── generic directory render ─────────────────────────────────────────────────

function render(path) {
  if (path === "/") { renderRoot(); return; }
  hideReadmePreface();
  if (path === "/writing/") { renderWriting(); renderBreadcrumb(path, null); return; }

  const entries = dirs[path];
  if (!entries) { render("/"); return; }

  renderBreadcrumb(path, null);
  show("listing");
  document.title = "Index of " + path;
  document.getElementById("dir-title").textContent = "Index of " + path;

  const tbody = document.getElementById("dir-body");
  tbody.innerHTML = "";

  const parent = parentOf(path);
  const hasParent = parent !== null;
  if (hasParent) {
    tbody.appendChild(parentDirRow(() => goDir(parent)));
  }

  entries.forEach((item, i) => {
    const displayName = item.type === "dir" ? item.name + "/" : item.name;
    const external = item.type === "link";

    const tr = document.createElement("tr");
    tr.className = "w-row" + (!hasParent && i === 0 ? " first-in-section" : "");
    tr.innerHTML =
      `<td class="w-icon">${iconFor(item.type)}</td>` +
      `<td class="w-main"><a href="#">${ESC(displayName)}</a></td>` +
      `<td class="w-date">${ESC(item.date || "")}</td>`;

    const a = tr.querySelector("a");
    const activate = () => {
      if (item.type === "dir") {
        const child = path === "/" ? "/" + item.name + "/" : path + item.name + "/";
        goDir(child);
      } else if (item.type === "post") {
        const meta = POST_BY_FILE[item.file] || { f: item.file, t: item.name, d: item.date, desc: item.desc };
        goPost(meta, path);
      } else if (item.type === "embed") {
        goEmbed(item, path);
      } else {
        goText(item.name, path);
      }
    };
    if (external) {
      a.href = item.href;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      // No preventDefault — let the browser open the external link in a new tab.
    } else {
      a.addEventListener("click", e => { e.preventDefault(); activate(); });
    }
    tbody.appendChild(tr);
    // Description row — full width under each entry, with an inline label
    // so the text starts on the same line as the word "Description".
    if (item.desc) {
      const dtr = document.createElement("tr");
      dtr.className = "w-desc-row";
      const labelled = `<span class="w-desc-label">Description:</span>${ESC(item.desc)}`;
      if (external) {
        dtr.innerHTML =
          `<td colspan="3"><a href="${item.href}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">${labelled}</a></td>`;
      } else {
        dtr.innerHTML = `<td colspan="3">${labelled}</td>`;
        dtr.style.cursor = "pointer";
        dtr.addEventListener("click", activate);
      }
      tbody.appendChild(dtr);
    }
  });
}

// ── root render — README preface + expandable items ────────────────────────
// Every entry under `/` becomes an accordion-style row: its content reveals
// inline beneath the row rather than swapping the listing out for a new
// view. This keeps the visitor oriented (README is always visible above) and
// turns the front page into a single browsable document.
//
// README is hoisted above the listing as a preface and filtered out of the
// rows below, since rendering it in both places would be redundant.

function renderRoot() {
  renderReadmePreface();
  renderBreadcrumb("/", null);
  show("listing");
  document.title = "Index of /";
  document.getElementById("dir-title").textContent = "Index of /";

  const tbody = document.getElementById("dir-body");
  tbody.innerHTML = "";

  const entries = (dirs["/"] || []).filter(e => e.name !== "README");

  entries.forEach((item, i) => {
    const displayName = item.type === "dir" ? item.name + "/" : item.name;
    const tr = document.createElement("tr");
    tr.className = "w-row" + (i === 0 ? " first-in-section" : "");
    tr.innerHTML =
      `<td class="w-icon">${iconFor(item.type)}</td>` +
      `<td class="w-main"><a href="#">${ESC(displayName)}</a></td>` +
      `<td class="w-date">${ESC(item.date || "")}</td>`;

    const a = tr.querySelector("a");
    const toggle = () => toggleRootExpansion(item, tr);
    a.addEventListener("click", e => { e.preventDefault(); toggle(); });
    tbody.appendChild(tr);

    let descRow = null;
    if (item.desc) {
      descRow = document.createElement("tr");
      descRow.className = "w-desc-row";
      descRow.innerHTML =
        `<td colspan="3"><span class="w-desc-label">Description:</span>${ESC(item.desc)}</td>`;
      descRow.style.cursor = "pointer";
      descRow.addEventListener("click", toggle);
      tbody.appendChild(descRow);
    }

    // Restore any previously-open expansion so navigating back to root
    // preserves the visitor's place.
    if (expandedRoot.has(item.name)) {
      tr.classList.add("is-expanded");
      insertExpansionRow(item, descRow || tr);
    }
  });
}

// Toggle handler: collapse an open expansion, or open a new one after the
// row's description (or the row itself, for descriptionless entries).
function toggleRootExpansion(item, row) {
  const descRow = row.nextElementSibling && row.nextElementSibling.classList.contains("w-desc-row")
    ? row.nextElementSibling
    : null;
  const anchor = descRow || row;
  const maybeExp = anchor.nextElementSibling;

  if (maybeExp && maybeExp.classList.contains("w-expansion") && maybeExp.dataset.name === item.name) {
    maybeExp.remove();
    row.classList.remove("is-expanded");
    expandedRoot.delete(item.name);
    return;
  }
  row.classList.add("is-expanded");
  expandedRoot.add(item.name);
  insertExpansionRow(item, anchor);
}

function insertExpansionRow(item, afterRow) {
  const tr = document.createElement("tr");
  tr.className = "w-expansion";
  tr.dataset.name = item.name;
  tr.innerHTML = `<td colspan="3"><div class="exp-wrap"></div></td>`;
  afterRow.parentNode.insertBefore(tr, afterRow.nextSibling);
  renderExpansionContent(item, tr.querySelector(".exp-wrap"));
}

// Build the inline content that appears when a root entry is expanded. Each
// directory type gets its own sub-listing; plain text files render as a <pre>.
function renderExpansionContent(item, container) {
  if (item.type === "dir" && item.name === "writing") {
    container.appendChild(buildWritingFragment());
    return;
  }
  if (item.type === "dir") {
    const subPath = "/" + item.name + "/";
    container.appendChild(buildSubListingFragment(dirs[subPath] || [], subPath));
    return;
  }
  if (item.type === "file" && item.name === "contact.txt") {
    // files["contact.txt"] already contains the sanitized <a> tags we want.
    container.innerHTML = `<pre class="exp-pre">${files["contact.txt"]}</pre>`;
    return;
  }
  if (item.type === "file" && item.name === "robots.txt") {
    container.innerHTML = `<div class="exp-loading">Loading…</div>`;
    fetch("./robots.txt", { cache: "no-cache" })
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        const esc = txt.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        container.innerHTML = `<pre class="exp-pre">${esc}</pre>`;
      })
      .catch(() => { container.innerHTML = "<div class='exp-loading'>[robots.txt could not be loaded]</div>"; });
    return;
  }
  container.innerHTML = `<div class="exp-loading">[no preview available]</div>`;
}

// /writing/ inlined — tiered sections, same structure as the standalone view.
// Clicking any post opens the narrow article modal without a page swap.
function buildWritingFragment() {
  const frag = document.createDocumentFragment();
  const tierNames = {
    1: "TIER 1 — POSTS THAT CHANGED NASHVILLE POLICY",
    2: "TIER 2 — MAJOR INVESTIGATIONS & EXTERNAL PUBLICATION",
    3: "TIER 3 — DEEP INVESTIGATIONS & SERIES ANCHORS",
    4: "TIER 4 — PHILOSOPHY, VOICE, IDENTITY",
  };
  const postsByTier = { 1:[], 2:[], 3:[], 4:[] };
  POSTS.forEach(p => { if (postsByTier[p.tier]) postsByTier[p.tier].push(p); });
  [1,2,3,4].forEach(t => postsByTier[t].sort((a,b) => b.d.localeCompare(a.d)));

  [1,2,3,4].forEach(tier => {
    const posts = postsByTier[tier];
    if (!posts.length) return;
    const h = document.createElement("div");
    h.className = "exp-section";
    h.textContent = tierNames[tier];
    frag.appendChild(h);
    posts.forEach((p, i) => frag.appendChild(buildExpRow({
      type: "post",
      name: p.t,
      date: p.d,
      desc: p.desc,
      onActivate: () => goPost(p, "/writing/"),
    }, i === 0)));
  });
  return frag;
}

// Generic sub-listing (used for /projects/ and /experiential-ontology/).
// Each entry is dispatched to the right handler based on its type.
function buildSubListingFragment(entries, path) {
  const frag = document.createDocumentFragment();
  // Projects open in a new tab — each row becomes an external anchor whose
  // href is the in-site hash route for that entry, so loading it in a new
  // tab boots the site straight into the project's viewer (or external URL).
  const openInNewTab = path === "/projects/";
  entries.forEach((item, i) => {
    let onActivate, external = false, href = null, badgeType = item.type;
    if (item.type === "dir") {
      onActivate = () => goDir(path + item.name + "/");
    } else if (item.type === "post") {
      const meta = POST_BY_FILE[item.file] || { f: item.file, t: item.name, d: item.date, desc: item.desc };
      onActivate = () => goPost(meta, path);
    } else if (item.type === "embed") {
      onActivate = () => goEmbed(item, path);
    } else if (item.type === "link") {
      external = true;
      href = item.href;
    } else {
      onActivate = () => goText(item.name, path);
    }
    if (openInNewTab && item.type !== "link") {
      // Compute the hash route this entry would resolve to via stateFromHash().
      let route;
      if (item.type === "dir")        route = path + item.name + "/";
      else if (item.type === "post")  route = path + item.file;
      else                            route = path + item.name; // embed | file
      external = true;
      href = "#" + route;
    }
    frag.appendChild(buildExpRow({
      type: badgeType,
      name: item.name + (item.type === "dir" ? "/" : ""),
      date: item.date,
      desc: item.desc,
      external, href, onActivate,
    }, i === 0));
  });
  return frag;
}

// Single expanded-row DOM element. Shared by /writing/ and the generic sub
// listings so both inherit the same hover/typography rhythm.
function buildExpRow({ type, name, date, desc, external, href, onActivate }, first) {
  const row = document.createElement(external ? "a" : "div");
  row.className = "exp-row" + (first ? " first" : "");
  if (external) {
    row.href = href;
    row.target = "_blank";
    row.rel = "noopener noreferrer";
    row.style.color = "inherit";
    row.style.textDecoration = "none";
  } else {
    row.addEventListener("click", onActivate);
  }
  const badgeLabel =
      type === "dir"   ? "DIR"
    : type === "link"  ? "EXT"
    : type === "embed" ? "APP"
    : type === "file"  ? "TXT"
    : type === "post"  ? "POST"
    :                    "";
  row.innerHTML =
    `<span class="exp-badge${type === "dir" ? " dir" : ""}">${badgeLabel}</span>` +
    `<div class="exp-body">` +
      `<span class="exp-name">${ESC(name)}${external ? " ↗" : ""}</span>` +
      (desc ? `<div class="exp-desc">${ESC(desc)}</div>` : "") +
    `</div>` +
    `<div class="exp-date">${ESC(date || "")}</div>`;
  return row;
}

// ── text viewer ──────────────────────────────────────────────────────────────

function openEmbed(item, fromP) {
  show("embedviewer");
  renderBreadcrumb(fromP, item.name);
  document.getElementById("e-filename").textContent = item.name;
  document.getElementById("e-meta").textContent = item.date + ' · ' + (item.desc || '');
  // Point the "open in new tab" affordance at the app's source URL so
  // visitors can pop the app out into its own window if they'd rather not
  // run it inside the full-bleed embed viewer.
  document.getElementById("e-open-ext").href = item.src;
  const frame = document.getElementById("e-frame");
  if (frame.src !== item.src) frame.src = item.src;
  document.title = item.name;
}

function openText(name, fromP) {
  show("textviewer");
  renderBreadcrumb(fromP, name);
  document.getElementById("tv-filename").textContent = name;
  // Show the manifest mtime on the right, same as the listing's date column.
  const entry = (dirs[fromP] || []).find(e => e.name === name);
  document.getElementById("tv-meta").textContent = entry && entry.date ? entry.date : "";
  document.getElementById("text-window").scrollTop = 0;
  document.title = name;
  const body = document.getElementById("tv-body");
  if (name === "README") {
    body.innerHTML = '<p class="loading">Loading…</p>';
    fetch("./README.md")
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        body.innerHTML = renderMarkdown(txt);
        body.querySelectorAll('a').forEach(a => {
          if (a.href && /^https?:/i.test(a.getAttribute('href') || '')) {
            a.target = '_blank'; a.rel = 'noopener';
          }
        });
      })
      .catch(() => { body.textContent = "[README.md could not be loaded]"; });
  } else if (name === "the-village") {
    // Fetch the project page and render it through the same minimal markdown
    // pipeline as README so the sub-page inherits the text-viewer chrome.
    body.innerHTML = '<p class="loading">Loading…</p>';
    fetch("./projects/the-village.md", { cache: "no-cache" })
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        body.innerHTML = renderMarkdown(txt);
        body.querySelectorAll('a').forEach(a => {
          if (a.href && /^https?:/i.test(a.getAttribute('href') || '')) {
            a.target = '_blank'; a.rel = 'noopener';
          }
        });
      })
      .catch(() => { body.textContent = "[the-village.md could not be loaded]"; });
  } else if (name === "robots.txt") {
    // Fetch the real robots.txt from the site root so the viewer can't drift
    // from what crawlers actually see.
    body.innerHTML = '<p class="loading">Loading…</p>';
    fetch("./robots.txt", { cache: "no-cache" })
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(txt => {
        const esc = txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        body.innerHTML = "<pre>" + esc + "</pre>";
      })
      .catch(() => { body.textContent = "[robots.txt could not be loaded]"; });
  } else {
    // Plain-text files (contact.txt) preserve whitespace.
    body.innerHTML = "<pre>" + (files[name] || "[no content]") + "</pre>";
  }
}

// ── minimal markdown renderer ────────────────────────────────────────────────
// Intentionally small and self-contained — just enough for README.md:
// headings, hr, lists, paragraphs, links, bold/italic, inline code.
function renderMarkdown(src) {
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inline = s => {
    // escape first, then apply inline patterns against the escaped string
    let t = esc(s);
    // inline code
    t = t.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    // images ![alt](url) — rendered as links to keep the renderer tiny
    t = t.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, alt, url) =>
      '<a href="' + url + '">' + (alt || url) + '</a>');
    // links [text](url)
    t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, txt, url) =>
      '<a href="' + url + '">' + txt + '</a>');
    // bold
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    // italic (allow after space, (, or inside an anchor tag boundary)
    t = t.replace(/(^|[\s(>])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    t = t.replace(/(^|[\s(>])_([^_\n]+)_/g, '$1<em>$2</em>');
    return t;
  };
  const lines = src.replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let i = 0, listType = null, listBuf = [], paraBuf = [];
  const flushPara = () => {
    if (paraBuf.length) {
      out.push('<p>' + inline(paraBuf.join(' ')) + '</p>');
      paraBuf = [];
    }
  };
  const flushList = () => {
    if (listBuf.length) {
      const tag = listType === 'ol' ? 'ol' : 'ul';
      out.push('<' + tag + '>' + listBuf.map(it => '<li>' + inline(it) + '</li>').join('') + '</' + tag + '>');
      listBuf = []; listType = null;
    }
  };
  while (i < lines.length) {
    const line = lines[i];
    // blank
    if (/^\s*$/.test(line)) { flushPara(); flushList(); i++; continue; }
    // horizontal rule
    if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) {
      flushPara(); flushList(); out.push('<hr>'); i++; continue;
    }
    // heading
    const h = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
    if (h) {
      flushPara(); flushList();
      const lvl = h[1].length;
      out.push('<h' + lvl + '>' + inline(h[2]) + '</h' + lvl + '>');
      i++; continue;
    }
    // unordered list item
    const ul = line.match(/^\s*[-*+]\s+(.*)$/);
    if (ul) {
      flushPara();
      if (listType && listType !== 'ul') flushList();
      listType = 'ul'; listBuf.push(ul[1]); i++; continue;
    }
    // ordered list item
    const ol = line.match(/^\s*\d+\.\s+(.*)$/);
    if (ol) {
      flushPara();
      if (listType && listType !== 'ol') flushList();
      listType = 'ol'; listBuf.push(ol[1]); i++; continue;
    }
    // paragraph accumulator
    flushList();
    paraBuf.push(line.trim());
    i++;
  }
  flushPara(); flushList();
  return out.join('\n');
}

// ── html post sanitize ───────────────────────────────────────────────────────

function sanitize(html) {
  const doc = new DOMParser().parseFromString('<div id="r">' + html + '</div>', 'text/html');
  const root = doc.getElementById('r');
  root.querySelectorAll('button,.image-link-expand,.pencraft,script,style').forEach(el => el.remove());
  root.querySelectorAll('.image2-inset').forEach(el => el.replaceWith(...el.childNodes));
  root.querySelectorAll('figure a.image-link').forEach(a => a.replaceWith(...a.childNodes));
  root.querySelectorAll('source').forEach(s => s.remove());
  root.querySelectorAll('img').forEach(img => {
    ['srcset','data-attrs','fetchpriority','width','height','sizes'].forEach(a => img.removeAttribute(a));
    img.loading = 'lazy';
  });
  root.querySelectorAll('a').forEach(a => {
    if (a.href && !a.href.startsWith('#')) { a.target = '_blank'; a.rel = 'noopener'; }
  });
  return root.innerHTML;
}

function wordCount(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return (d.textContent || '').split(/\s+/).filter(Boolean).length;
}

// Posts are stored as .md files with YAML-ish frontmatter followed by a raw
// HTML body (we "embrace the HTML" rather than converting to MD syntax). Split
// the frontmatter off so the body can go through the same sanitize pipeline.
function parseFrontmatter(raw) {
  const m = raw.match(/^---\s*\r?\n([\s\S]*?)\r?\n---\s*\r?\n([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split(/\r?\n/).forEach(line => {
    const mm = line.match(/^([A-Za-z_][\w-]*)\s*:\s*(.*)$/);
    if (!mm) return;
    let v = mm[2].trim();
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      v = v.slice(1, -1).replace(/\\"/g, '"').replace(/\\'/g, "'");
    }
    meta[mm[1]] = v;
  });
  return { meta, body: m[2] };
}

// ── shared article modal ────────────────────────────────────────────────────
// A single narrow modal overlay used for every article — both the /writing/
// corpus (openPost) and the Rich Text RSS items. Before the modal opens we
// snapshot the current viewer state so closing the modal returns the visitor
// exactly where they were (listing, sub-listing, prior post, etc).

let savedModalState = null;

function ensureListingBehindModal() {
  // When the modal is triggered via a direct hash link (no backdrop pane yet
  // rendered), we paint the root listing underneath so the close action has
  // somewhere sensible to land.
  const panes = ["listing","viewer","textviewer","embedviewer"];
  const visible = panes.find(p => document.getElementById(p).style.display !== "none");
  if (!visible || visible === "viewer") {
    show("listing");
    const body = document.getElementById("dir-body");
    if (!body.children.length) renderRoot();
  }
}

function openArticleModal({ filename, metaLine, html, title }) {
  const viewer   = document.getElementById("viewer");
  const backdrop = document.getElementById("viewer-backdrop");

  if (!viewer.classList.contains("modal-mode")) {
    ensureListingBehindModal();
    const panes = ["listing","viewer","textviewer","embedviewer"];
    const visiblePane = panes.find(p => document.getElementById(p).style.display !== "none") || "listing";
    savedModalState = {
      pane:        visiblePane,
      filename:    document.getElementById("v-filename").textContent,
      meta:        document.getElementById("v-meta").textContent,
      contentHtml: document.getElementById("content-window").innerHTML,
      title:       document.title,
      scrollY:     window.scrollY,
    };
  }

  document.getElementById("v-filename").textContent = filename || "";
  document.getElementById("v-meta").textContent     = metaLine || "";
  const cw = document.getElementById("content-window");
  cw.innerHTML = html || "";
  cw.scrollTop = 0;
  if (title) document.title = title;

  backdrop.classList.add("open");
  viewer.classList.add("modal-mode");
  viewer.style.display = "block";
  viewer.scrollTop = 0;
  document.body.style.overflow = "hidden";
}

function closeArticleModal() {
  const viewer   = document.getElementById("viewer");
  const backdrop = document.getElementById("viewer-backdrop");
  if (!viewer.classList.contains("modal-mode")) return false;

  viewer.classList.remove("modal-mode");
  backdrop.classList.remove("open");
  document.body.style.overflow = "";

  if (savedModalState) {
    document.getElementById("v-filename").textContent  = savedModalState.filename;
    document.getElementById("v-meta").textContent      = savedModalState.meta;
    document.getElementById("content-window").innerHTML = savedModalState.contentHtml;
    document.title = savedModalState.title;
    show(savedModalState.pane);
    window.scrollTo(0, savedModalState.scrollY || 0);
    savedModalState = null;
  } else {
    show("listing");
  }
  return true;
}

async function openPost(meta, fromP) {
  openArticleModal({
    filename: meta.t,
    metaLine: (meta.d || "") + " · loading…",
    html:     '<div class="loading">fetching posts/' + meta.f + ' …</div>',
    title:    meta.t,
  });

  // Cache-bust with the build tag so a stale CDN 404 on first deploy of a
  // renamed post doesn't strand the reader on an "HTTP 404" page.
  const url = 'posts/' + meta.f + '?v=' + encodeURIComponent(BUILD_TAG);
  try {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + url);
    const raw = await res.text();
    const { meta: fm, body } = parseFrontmatter(raw);
    // Prefer title/date from the file's own frontmatter — the post file is
    // the source of truth; the manifest entry is just a fallback.
    if (fm.title) {
      document.getElementById('v-filename').textContent = fm.title;
      document.title = fm.title;
    }
    const clean = sanitize(body);
    const wc = wordCount(body);
    const mins = Math.max(1, Math.ceil(wc / 220));
    document.getElementById('v-meta').textContent =
      (fm.date || meta.d) + ' · ' + wc.toLocaleString() + ' words · ~' + mins + ' min read';
    const w = document.getElementById('content-window');
    w.innerHTML = clean;
    w.scrollTop = 0;
  } catch (err) {
    document.getElementById('content-window').innerHTML =
      '<div class="error">Could not load post.<br>' +
      'If you opened this file directly (file://), your browser may block fetch. ' +
      'Serve with <code>python3 -m http.server</code> and visit http://localhost:8000.<br><br>' +
      '<small>' + err.message + '</small></div>';
    document.getElementById('v-meta').textContent = (meta.d || '') + ' · error';
  }
}

// ── Shadowbox ────────────────────────────────────────────────────────────
// Click any <img> in the article → overlay the full-size asset. Substack
// wraps images in <a class="image-link" href="…full-size…">, so prefer that
// href when present; otherwise fall back to img.currentSrc / img.src. We
// intercept at the #content-window level so dynamically-rendered posts
// don't each need their own handler.
(function initLightbox() {
  const box = document.getElementById('lightbox');
  if (!box) return;
  const lbImg = box.querySelector('img');
  const closeBtn = box.querySelector('.lb-close');

  function open(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt || '';
    box.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    box.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('click', (e) => {
    const cw = document.getElementById('content-window');
    if (!cw || !cw.contains(e.target)) return;
    const img = e.target.closest('img');
    if (!img) return;
    // Prefer the Substack-wrapped full-size link if it's an <a class="image-link">
    const link = img.closest('a.image-link, a.image2, a.is-viewable-img');
    const src = (link && link.href) || img.currentSrc || img.src;
    if (!src) return;
    e.preventDefault();
    open(src, img.alt);
  });

  box.addEventListener('click', (e) => {
    // Close when clicking the backdrop, close button, or the image itself.
    if (e.target === box || e.target === lbImg || e.target === closeBtn) close();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && box.classList.contains('open')) close();
  });
})();

// ── Rich Text (Substack) widget ─────────────────────────────────────────────
// Fetches the substack RSS via an n8n webhook proxy (RSS → JSON) and renders
// a small paginated feed card in the upper-right. Clicking an item opens the
// post in an overlay modal that reuses #viewer + #content-window so the
// formatting matches posts under /writing/.
(function initRTWidget() {
  const PROXY = 'https://n8n.intelechia.com/webhook/b5e89bf9-a8bb-43ef-b1de-ceac4b0d6f59';
  const PER = 5;
  let items = [], page = 0;

  const rtBody = () => document.getElementById('rt-body');
  const esc = s => String(s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
  const fmtDate = d => {
    try { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
    catch (_) { return d; }
  };

  function renderList() {
    const s = page * PER, sl = items.slice(s, s + PER);
    const tot = items.length, tp = Math.max(1, Math.ceil(tot / PER));
    let h = '<div>';
    sl.forEach((item, i) => {
      h += `<div class="rtw-pi" data-i="${s + i}">` +
             `<p class="rtw-pt">${esc(item.title)}</p>` +
             `<p class="rtw-pd">${esc(fmtDate(item.date))}</p>` +
           `</div>`;
    });
    h += `</div>` +
         `<div class="rtw-f">` +
           `<span class="rtw-count">${s + 1}–${Math.min(s + PER, tot)} of ${tot}</span>` +
           `<div style="display:flex;gap:1px">` +
             `<button class="rtw-n" id="rtw-prev" ${page === 0 ? 'disabled' : ''} aria-label="Previous">&#8249;</button>` +
             `<button class="rtw-n" id="rtw-next" ${page >= tp - 1 ? 'disabled' : ''} aria-label="Next">&#8250;</button>` +
           `</div>` +
         `</div>`;
    rtBody().innerHTML = h;
    document.querySelectorAll('#rt-widget .rtw-pi').forEach(el => {
      el.addEventListener('click', () => openItemModal(items[+el.dataset.i]));
    });
    document.getElementById('rtw-prev')?.addEventListener('click', () => { page--; renderList(); });
    document.getElementById('rtw-next')?.addEventListener('click', () => { page++; renderList(); });
  }

  async function load() {
    try {
      const r = await fetch(PROXY);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      const xmlStr = j.data || j.contents || j.body || Object.values(j)[0];
      if (!xmlStr) throw new Error('no data field in response');
      const xml = new DOMParser().parseFromString(xmlStr, 'text/xml');
      const parseErr = xml.querySelector('parsererror');
      if (parseErr) throw new Error('XML parse error');
      const ns = 'http://purl.org/rss/1.0/modules/content/';
      items = Array.from(xml.querySelectorAll('item')).map(el => ({
        title:   el.querySelector('title')?.textContent?.trim() || '',
        link:    el.querySelector('link')?.textContent?.trim() || el.querySelector('guid')?.textContent?.trim() || '',
        date:    el.querySelector('pubDate')?.textContent || '',
        content: el.getElementsByTagNameNS(ns, 'encoded')[0]?.textContent
               || el.querySelector('description')?.textContent || ''
      }));
      if (!items.length) throw new Error('no items parsed');
      const latestEl = document.getElementById('rtw-latest');
      if (latestEl && items[0]) latestEl.textContent = items[0].title;
      renderList();
    } catch (e) {
      rtBody().innerHTML = `<div class="rtw-load">Error: ${esc(e.message)}</div>`;
      console.error('[rt-widget]', e);
    }
  }

  // Rich Text items are rendered through the shared article modal so they
  //    inherit the same narrow-column typography as /writing/ posts. The only
  //    RSS-specific bit is appending a "Read on Substack ↗" footer since the
  //    feed's HTML body doesn't carry a canonical link of its own.
  function openItemModal(item) {
    if (!item) return;
    const rawBody = item.content || '<p>No preview available.</p>';
    const clean   = sanitize(rawBody);
    const wc      = wordCount(rawBody);
    const mins    = Math.max(1, Math.ceil(wc / 220));
    const footer  = item.link
      ? `<p style="margin-top:2em;font-size:13px;color:var(--fg-muted)">` +
          `<a href="${esc(item.link)}" target="_blank" rel="noopener">Read on Substack ↗</a>` +
        `</p>`
      : '';
    openArticleModal({
      filename: item.title,
      metaLine: fmtDate(item.date) + ' · ' + wc.toLocaleString() + ' words · ~' + mins + ' min read · Rich Text',
      html:     clean + footer,
      title:    item.title,
    });
  }

  // If the modal was opened via goPost (URL pushed to history), closing it
  // should step back one entry so the URL and visible view stay in sync.
  // If the modal came from the RT widget (no history push) we just tear it
  // down in place.
  const closeModal = () => {
    if (history.state && history.state.view === 'post') history.back();
    else closeArticleModal();
  };

  // Header click toggles the collapsed state. The external-link anchor inside
  // the header stops propagation so clicking the ↗ icon still opens Substack
  // without triggering the toggle.
  const widget = document.getElementById('rt-widget');
  const header = document.getElementById('rtw-header');
  const toggle = () => {
    const collapsed = widget.classList.toggle('collapsed');
    header.setAttribute('aria-expanded', String(!collapsed));
  };
  header.addEventListener('click', e => {
    if (e.target.closest('.rtw-ha')) return;
    toggle();
  });
  header.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });

  document.getElementById('viewer-modal-close').addEventListener('click', closeModal);
  document.getElementById('viewer-backdrop').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('viewer').classList.contains('modal-mode')) {
      closeModal();
    }
  });

  load();
})();

// Initial load: URL hash wins (so shared/bookmarked links resolve correctly),
// then saved history.state, then default to root.
(function init() {
  if (location.hash && location.hash.length > 1) {
    const s = stateFromHash(location.hash);
    // If the visitor deep-links to a post (modal view), seed a root entry
    // underneath so closing the modal has somewhere to step back to instead
    // of stranding them on a history dead-end.
    if (s.view && s.view !== 'dir') {
      pushNav({ view: 'dir', path: '/' }, true);
      pushNav(s);
    } else {
      pushNav(s, true);
    }
    restoreFromState(s);
    return;
  }
  if (history.state && history.state.view) {
    restoreFromState(history.state);
    return;
  }
  pushNav({ view: 'dir', path: '/' }, true);
  render('/');
})();
</script>
